{id:'preps',sec:'Grammar',icon:'📍',ttl:'Prepositions',sub:'Words that show position, direction and relationship',fc:[
{type:'mc',q:'What is a preposition?',a:'A word that shows the relationship between a noun and other words — usually position, direction or time',eg:'The flamingo wades in the water. The cat sat on the mat.',w:['A word that describes a noun','A word that joins two main clauses','A word that replaces a noun in a sentence']},
{type:'fill',q:'Fill in the correct preposition.',pass:'Flamingos wade around the water in search ___ food.',blanks:['of'],opts:['of','in','at','for'],eg:'"in search of something" — this is a fixed phrase'},
{type:'fill',q:'Fill in the correct preposition.',pass:'The squirrel scampered ___ his tree to examine the dog.',blanks:['down'],opts:['down','up','into','across'],eg:'Scampered DOWN from his tree = moving from high to low'},
{type:'fill',q:'Fill in the correct preposition.',pass:'The dog was sleeping comfortably next ___ the fire.',blanks:['to'],opts:['to','at','of','by'],eg:'Next TO = beside something'},
{type:'fill',q:'Fill in the correct preposition.',pass:'Jamie arrived ___ school before the bell rang.',blanks:['at'],opts:['at','in','on','to'],eg:'You arrive AT a place (school, work, home, the shops)'},
{type:'fill',q:'Fill in the correct preposition.',pass:'The flamingo stood ___ one leg in the shallow water.',blanks:['on'],opts:['on','in','at','by'],eg:'Standing ON one leg = the leg it is using to support itself'},
,
{type:'tf',q:'You arrive in school not at school.',a:'false',explanation:'You arrive at a specific place or destination. At school, at work, at home, at the shops. You use in for enclosed spaces. In the classroom, in the building.'},
{type:'tf',q:'Next to is a preposition that shows position.',a:'true',explanation:'Next to means beside something. The dog sat next to the fire. Prepositions of position include in, on, under, above, below, behind, next to and between.'},
{type:'tf',q:'In search of is a fixed prepositional phrase.',a:'true',explanation:'Some prepositions appear in fixed phrases that must be memorised. In search of, afraid of, good at and interested in are all fixed prepositional phrases.'}
],mm:{c:'Prepositions',cc:'#A855F7',b:[
{l:'Position',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['in, on, under, above, below','behind, in front of, between','next to, beside, near']},
{l:'Direction',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['to, from, towards, away from','up, down, through, across','into, out of, along']},
{l:'Time',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['at (exact time: at 3pm)','on (day: on Monday)','in (month/year: in January)']},
{l:'Fixed phrases',bg:'#1A0A1A',bd:'#A855F7',tc:'#D8B4FE',i:['in search OF','afraid OF','good AT','interested IN','next TO']},
]},rules:[
{n:"1",c:"#2563EB",t:"AT / IN / ON for time",d:"Each preposition covers a different size of time period. Smaller and more precise = smaller preposition.",eg:[{lbl:"AT",txt:"Exact time: at 3pm, at noon, at midnight, at the end of the month."},{lbl:"ON",txt:"Specific day or date: on Monday, on 14 May, on my birthday, on Christmas Day."},{lbl:"IN",txt:"Longer periods: in January, in 2026, in winter, in the morning, in the future."}]},
{n:"2",c:"#10B981",t:"AT / IN / ON for place",d:"These same three prepositions work differently for locations. Think about the type of place.",eg:[{lbl:"AT",txt:"A specific point or destination: at school, at work, at home, at the corner."},{lbl:"IN",txt:"Inside an enclosed space: in the room, in the car, in Cape Town, in South Africa."},{lbl:"ON",txt:"On a surface or transport: on the table, on the floor, on the bus, on the street."}]},
{n:"3",c:"#A855F7",t:"Fixed prepositional phrases — memorise these",d:"Some prepositions combine with specific words to form fixed phrases. The preposition cannot be swapped.",eg:[{lbl:"OF",txt:"in search of, afraid of, fond of, capable of, full of, made of"},{lbl:"IN",txt:"interested in, good in, succeed in, believe in, result in"},{lbl:"AT",txt:"good at, angry at, surprised at, arrive at, look at"}]}
],
tip:{t:"Preposition trick — if you can imagine it physically (on, under, behind, through) it is showing position or direction. Read the sentence aloud — the wrong preposition sounds strange.",c:'#1A0A1A',b:'#A855F7',tc:'#D8B4FE'}},

{id:'spelling',sec:'Grammar',icon:'🔤',ttl:'Spelling and punctuation correction',sub:'Correcting errors — just like in the exam',fc:[
{type:'fix',q:'Correct ALL errors in this sentence. Rewrite it in full.',pass:"Are flamingo's the most elegent birds in the world",a:"Are flamingos the most elegant birds in the world?",hint:"1. Remove wrong apostrophe — flamingos is just a plural, no apostrophe needed. 2. Fix elegant — not elegent. 3. Add a question mark at the end.",eg:"flamingos (plural, no apostrophe). elegant (correct spelling). Question needs ?"},
{type:'fix',q:'Correct ALL errors in this sentence.',pass:"The teacher said that the learners was to quiet during the test.",a:"The teacher said that the learners were too quiet during the test.",hint:"1. Concord error: learners were (not was). 2. Wrong word: too (not to) — too means very.",eg:"learners = plural = were. too quiet = very quiet (not to quiet)"},
{type:'fix',q:'Correct ALL errors in this sentence.',pass:"jamie and his friend's went to the libary on saturday morning.",a:"Jamie and his friends went to the library on Saturday morning.",hint:"1. Jamie needs a capital letter. 2. friends has a wrong apostrophe — it is just a plural. 3. library not libary. 4. Saturday needs a capital letter.",eg:"Jamie = proper noun = capital. friends = plural = no apostrophe. library = correct spelling. Saturday = proper noun = capital"},
{type:'fix',q:'Correct ALL errors in this sentence.',pass:"The principle told the learners to line up at there classrooms.",a:"The principal told the learners to line up at their classrooms.",hint:"1. principle (a rule) → principal (the head of a school). 2. there (a place) → their (belonging to them).",eg:"principal = head of school. their = belonging to the learners"},
{type:'fix',q:'Add the missing capitalisation and punctuation.',pass:"dear mr jones i am writing to ask about the science project yours faithfully sarah",a:"Dear Mr Jones,\nI am writing to ask about the science project.\nYours faithfully,\nSarah",hint:"Dear, Mr Jones, Yours faithfully and Sarah all need capital letters. Add a comma after Dear Mr Jones and after Yours faithfully. Add a full stop after the sentence.",eg:"Format a formal letter: Dear [Name], [body]. Yours faithfully, [Signature]"},
{type:'fix',q:'Correct ALL errors in this sentence.',pass:"Its going to be a beautifull day tomorrow weather permiting.",a:"It's going to be a beautiful day tomorrow, weather permitting.",hint:"1. Its → It's (it is). 2. beautifull → beautiful (one l). 3. permiting → permitting (double t). 4. Add comma before weather permitting.",eg:"it's = it is (contraction needs apostrophe). beautiful = one l. permitting = double t"},
,
{type:'tf',q:'Beautifull is the correct spelling of the word.',a:'false',explanation:'The correct spelling is beautiful with only one l at the end. Other commonly misspelt words include library, not libary, and elegant, not elegent.'},
{type:'tf',q:'The words their and there are interchangeable because they sound the same.',a:'false',explanation:'Their means belonging to them. There refers to a place. They are means a contraction of they are. These three words sound the same but have completely different meanings.'},
{type:'tf',q:'The word principal can refer to the head of a school.',a:'true',explanation:'The principal is the head of a school. A principle is a rule or belief. Remember that the principal is your pal. That helps you spell it correctly.'}
],mm:{c:'Spelling and Punctuation',cc:'#EF4444',b:[
{l:'Common spelling errors',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['beautiful (not beautifull)','library (not libary)','elegant (not elegent)','beginning (not begining)','necessary (not neccesary)']},
{l:'Common punctuation errors',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:["Wrong apostrophe in plurals (dogs' is possessive, dogs is just plural)",'Missing question mark','Missing capital letters for proper nouns','its vs it\'s — belonging vs contraction']},
{l:'Common word confusions',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['there (place) / their (belonging) / they\'re (they are)','to (direction) / too (very) / two (number)','principal (person) / principle (rule)','affect (verb) / effect (noun)']},
]},rules:[
{n:"1",c:"#2563EB",t:"Four-step error correction check",d:"Use these four steps in order every time you check a sentence for errors.",eg:[{lbl:"STEP 1: CAPITALS",txt:"Check every proper noun: names, places, days, months. All need a capital letter."},{lbl:"STEP 2: APOSTROPHES",txt:"Every apostrophe must be a contraction (don't) or possession (the dog's bone). No other use."},{lbl:"STEP 3: SPELLING",txt:"Sound the word out. Check common trouble spots: beautiful, library, necessary, definitely."},{lbl:"STEP 4: END MARK",txt:"Every sentence ends with . or ? or ! — make sure it is the right one."}]},
{n:"2",c:"#10B981",t:"Plural vs possessive — apostrophe position",d:"Most plurals have NO apostrophe. Only add one if something BELONGS to the noun.",eg:[{lbl:"PLURAL (no apostrophe)",txt:"The dogs ran away. More than one dog, no possession, no apostrophe."},{lbl:"POSSESSION (apostrophe before s)",txt:"The dog's bone. The bone belongs to one dog."},{lbl:"PLURAL POSSESSION (apostrophe after s)",txt:"The dogs' bones. The bones belong to many dogs."}]},
{n:"3",c:"#FB923C",t:"Confusable words — there / their / they're",d:"These three words sound identical but have completely different meanings.",eg:[{lbl:"THERE = PLACE",txt:"The book is over THERE. Think: HERE and THERE both have HERE in them."},{lbl:"THEIR = BELONGING",txt:"It is THEIR bag. Think: THEIR has HEIR in it — someone who inherits = belongs to."},{lbl:"THEY'RE = THEY ARE",txt:"THEY'RE going home. Expand it: They are going home. If it fits, use they're."}]}
],
tip:{t:"Read the sentence backwards word by word. This breaks the flow and forces you to look at each word individually. Spelling errors are much easier to spot this way.",c:'#1A0A0A',b:'#EF4444',tc:'#FCA5A5'}},

{id:'newspaper',sec:'Writing',icon:'📰',ttl:'Newspaper article format',sub:'Headline, byline, intro and body — exam writing format',fc:[
{type:'mc',q:'What are the five key parts of a newspaper article?',a:'Newspaper name, headline, byline (reporter), introduction paragraph (5 Ws), and body paragraphs',eg:'The Daily News / DOG BITES LEARNER / By Jamie Smith / A Grade 6 learner was bitten...',w:['Title, salutation, body, sign-off, date','Heading, subheading, topic sentence, evidence, conclusion','Introduction, build-up, conflict, resolution, conclusion']},
{type:'mc',q:'What must the INTRODUCTION paragraph of a newspaper article answer?',a:'The five Ws — Who, What, When, Where and Why (and sometimes How)',eg:'A Grade 6 learner (WHO) was bitten by a dog (WHAT) on Monday morning (WHEN) outside Pine Street School (WHERE) while walking to school (HOW).',w:['Only Who and What — the other Ws come later','Only Why and How — these are the most important','Only When and Where — these set the scene']},
{type:'id',q:'Write a HEADLINE for this newspaper article. Make it short, punchy and in the present tense.',pass:'A Grade 6 learner named Jamie was bitten by a dog while walking to school on Monday morning outside Pine Street School.',a:'DOG BITES LEARNER ON WAY TO SCHOOL',hint:'Headlines are SHORT. They use the present tense even for past events. They are usually in CAPITAL LETTERS.',eg:'DOG BITES LEARNER ON WAY TO SCHOOL — short, present tense, punchy'},
{type:'id',q:'Write an INTRODUCTION paragraph for this newspaper article. Include at least 3 of the 5 Ws.',pass:'Event: a Grade 6 learner was bitten by a dog. Learner: Jamie. Time: Monday morning. Place: outside Pine Street School. Cause: dog ran out of a yard.',a:'A Grade 6 learner, Jamie, was bitten by a dog on Monday morning outside Pine Street School when the dog ran out of a nearby yard.',hint:'Intro = one or two sentences. Pack in Who (Jamie), What (bitten by a dog), When (Monday morning), Where (outside Pine Street School).',eg:'Pack as many Ws as possible into the opening sentence'},
{type:'mc',q:'What is a BYLINE in a newspaper article?',a:'The name of the reporter who wrote the article — written below the headline',eg:'By Jamie Smith / By Our Reporter',w:['The main heading at the top of the article in large print','A short summary paragraph below the main headline','The caption below a photograph in the article']},
{type:'mc',q:'What tense do you write a newspaper article in?',a:'Past tense for events that already happened — the article reports what occurred',eg:'The learner was bitten. The dog ran out. The teacher helped.',w:['Present tense because newspaper articles feel like they are happening now','Future tense because the article predicts what will happen next','Mixed tense — present for facts, past for the event itself']},
,
{type:'tf',q:'A newspaper headline is written in the past tense.',a:'false',explanation:'Headlines are written in the present tense even when reporting past events. Dog bites learner, not dog bit learner. This makes headlines feel urgent and immediate.'},
{type:'tf',q:'The five Ws in a newspaper article are Who, What, When, Where and Why.',a:'true',explanation:'The introduction paragraph of a newspaper article must answer all five Ws. Who was involved, what happened, when it happened, where it happened and why or how it happened.'},
{type:'tf',q:'The byline tells the reader who wrote the article.',a:'true',explanation:'The byline appears below the headline and gives the reporter name. By Jamie Smith or By Our Reporter. It identifies who wrote the article.'}
],mm:{c:'Newspaper Article',cc:'#06B6D4',b:[
{l:'Format (in order)',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['1. Newspaper name (top)','2. Headline — short and punchy, CAPITALS','3. Byline — By [reporter name]','4. Introduction — the 5 Ws in 1-2 sentences','5. Body paragraphs — details and quotes']},
{l:'The 5 Ws',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['WHO — who was involved?','WHAT — what happened?','WHEN — when did it happen?','WHERE — where did it happen?','WHY/HOW — why or how did it happen?']},
{l:'Language features',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['Past tense throughout','Third person (he/she/they)','Short punchy sentences','Include one eyewitness quote','Factual and objective — no opinions']},
]},rules:[
{n:"1",c:"#2563EB",t:"Headline rules — short, punchy, present tense",d:"Headlines have strict conventions that make them stand out and grab attention.",eg:[{lbl:"PRESENT TENSE",txt:"Dog Bites Learner — not Dog Bit Learner. Present tense creates urgency."},{lbl:"SHORT",txt:"Aim for 5 to 8 words maximum. Every word must earn its place."},{lbl:"PUNCHY",txt:"Leave out the, a, an, and is/are where possible: Dog Bites Learner not A Dog Has Bitten a Learner."}]},
{n:"2",c:"#10B981",t:"Introduction paragraph — pack in the 5 Ws",d:"The first paragraph must answer all five Ws in one or two sentences.",eg:[{lbl:"THE 5 Ws",txt:"WHO + WHAT + WHEN + WHERE + WHY/HOW"},{lbl:"EXAMPLE",txt:"A Grade 6 learner named Jamie (WHO) was bitten by a dog (WHAT) on Monday morning (WHEN) outside Pine Street School (WHERE) when the dog escaped from a nearby yard (HOW)."},{lbl:"TIP",txt:"Read your first paragraph. Can you find all five answers? If not, add the missing one."}]},
{n:"3",c:"#FB923C",t:"Format marks are the easiest marks",d:"Write the newspaper structure first — even under time pressure.",eg:[{lbl:"FORMAT",txt:"1. Newspaper name | 2. HEADLINE IN CAPITALS | 3. By [Reporter Name] | 4. Introduction (5 Ws) | 5. Body paragraphs"},{lbl:"TIP",txt:"Even if you run out of time, write the format structure first. Those marks cost zero creativity."}]}
],
tip:{t:"Mind map first. Put the event in the centre. Five branches = 5 Ws. Fill each branch. Then write your introduction sentence using all five branches at once.",c:'#0A1A1A',b:'#06B6D4',tc:'#67E8F9'}},
]}};

{type:'mc',q:'Watter sintuig MOET jy gebruik in beskrywende skryfwerk?',a:'Al vyf sintuie — sien, hoor, ruik, proe, voel',eg:'\'n Goeie beskrywende opstel aktiveer al die sintuie van die leser.',w:['Slegs sig en gehoor','Slegs sig en gevoel','Net sig en reuk']},
{type:'mc',q:'Watter sinvorm help om \'n beskrywende opstel LEWEND te maak?',a:'Metafore en vergelykings',eg:'Die son was \'n glinsterende goue koek. (metafoor) / Sy stem was soos donderweer. (vergelyking)',w:['Baie kort sinne','Slegs feite sonder beskrywing','Herhaling van dieselfde woord']},
{type:'id',q:'Verduidelik die verskil tussen "wys" en "vertel" in beskrywende skryfwerk.',a:'Vertel noem die gevoel direk (sy was bang). Wys beskryf die fisiese tekens van die gevoel (haar hande het gebewe, haar asem het gesnak).',hint:'Stel jou voor jy kyk \'n fliek — wat sien jy? Noem dit.',eg:'"Vertel": Hy was baie bang. "Wys": Sy knieë het geril en sy asem het in skerp stokkies gekom.'},
{type:'tf',q:'\'n Beskrywende opstel moet al vyf sintuie insluit.',a:'true',explanation:'\'n Goeie beskrywende opstel gebruik al vyf sintuie — wat jy sien, hoor, ruik, proe en voel. Hierdie sintuie maak die beskrywing lewend vir die leser.'},
{type:'tf',q:'Jy moet altyd \'n breinkaart maak voor jy \'n opstel skryf.',a:'true',explanation:'\'n Breinkaart (mind map) organiseer jou idees voor jy skryf. Dit verhoed dat jy vassteek en help jou om \'n gestruktureerde, vloeiende opstel te skryf.'},
{type:'tf',q:'Vae woorde soos "mooi" en "goed" maak \'n opstel beter.',a:'false',explanation:'Vae woorde skep geen duidelike beeld nie. Vervang "mooi" met "pragtig", "asemrowend", "verstommend". Vervang "goed" met "uitstekend", "voortreflik", "besonders". Presiese woorde maak jou opstel lewendig.'}

{l:'Wys Nie Vertel Nie',bg:'#1A0D05',bd:'#F97316',tc:'#FED7AA',i:['Vertel: sy was bang','Wys: haar hande het gebewe','Beskryf fisiese tekens van gevoelens']}
]},rules:[

{n:'2',c:'#F59E0B',t:'Wys nie vertel nie',d:'Vervang elke sin wat \'n gevoel noem met fisiese beskrywings.',eg:[{lbl:'VERTEL (SWAK)',txt:'Sy was baie opgewonde.'},{lbl:'WYS (STERK)',txt:'Haar hart het soos \'n trom geslaan en sy kon nie stilsit nie.'},{lbl:'REEL',txt:'As jy die woord met een emosie-woord kan vervang, is jy aan die "vertel". Herskryf dit.'}]},
{n:'3',c:'#EF4444',t:'Woorde opgradeer',d:'Vervang vae woorde met presiese, kragtige woorde.',eg:[{lbl:'GESÊ →',txt:'gefluister, geroep, gemompel, uitgebars, uitgeskree'},{lbl:'GELOOP →',txt:'gestap, getrippel, gestamp, geglip, gehardloop'},{lbl:'MOOI →',txt:'pragtig, asemrowend, verblindend, verstommend'}]}

{type:'id',q:'Hoe bepaal jy die stemming (mood) van \'n gedig?',a:'Kyk na die woorde wat die digter kies, die beelde wat gebruik word en die ritme. Positiewe woorde skep \'n blymoedige stemming; donker beelde skep \'n droewige stemming.',hint:'Vra jouself: hoe laat hierdie gedig my voel?',eg:'Woorde soos "skaduwees", "koudte", "verlies" → droewige stemming'},
{type:'tf',q:'Alliterasie is die herhaling van dieselfde beginklank in opeenvolgende woorde.',a:'true',explanation:'Alliterasie herhaal dieselfde beginklank — Pieter Potgieter pluk perskes. Die P-klank herhaal. Dit gee ritme en klem aan die taal.'},
{type:'tf',q:'\'n Gedig se stemming en \'n gedig se toon beteken dieselfde ding.',a:'false',explanation:'Toon is die DIGTER se houding teenoor die onderwerp. Stemming is hoe die LESER voel tydens lees. Hulle is verwant maar verskillend.'},
{type:'tf',q:'Rym is noodsaaklik — sonder rym is dit nie \'n gedig nie.',a:'false',explanation:'Nie alle gedigte rym nie. Vrye verse (free verse) het geen rym of vaste ritme nie maar is steeds gedigte. Die kenmerk van \'n gedig is die gebruik van taal op \'n artistieke manier.'}

{n:'2',c:'#F59E0B',t:'Stemmingsraam',d:'Gebruik hierdie raam vir stemming-vrae in die eksamen.',eg:[{lbl:'RAAM',txt:'Die stemming van die gedig is [stemming] omdat die digter woorde gebruik soos [woorde] wat [betekenis] suggereer.'},{lbl:'VOORBEELD',txt:'Die stemming is treurig omdat die digter woorde gebruik soos "donker" en "koudte" wat verlies suggereer.'}]},

{type:'tf',q:'"Hoogagtend" word gebruik wanneer jy die naam van die ontvanger KEN.',a:'true',explanation:'"Hoogagtend" gaan saam met "Beste Mnr. Smith" — jy ken die naam. "U dienswillige" gaan saam met "Geagte Meneer" — jy ken die naam nie.'},

{n:'3',c:'#EF4444',t:'Verskillende transaksionele tekste',d:'Elke transaksionele teks het sy eie formaat — ken elke een.',eg:[{lbl:'BRIEF',txt:'Adres, datum, aanspreek, liggaam, slotvorm'},{lbl:'E-POS',txt:'Onderwerp: [duidelik], Beste [naam], Liggaam, Groete'},{lbl:'KENNISGEWING',txt:'KENNISGEWING (heading), datum, Aan: [gehoor], Doel, Besonderhede, Kontakbesonderhede'}]}

{type:'mc',q:'Watter sin gebruik die VOLTOOIDE VERLEDE TYD (had done)?',a:'"Teen die tyd dat ek gekom het, had hulle al geëet."',eg:'Voltooide verlede tyd = had + voltooide deelwoord — iets wat gebeur het VOOR \'n ander verlede handeling.',w:['Hulle eet tans.','Hulle sal eet.','Hulle eet gister.']},
{type:'mc',q:'Watter is \'n voorbeeld van die TEENWOORDIG DEURLOPENDE tyd?',a:'"Sy is tans besig om te lees."',eg:'Teenwoordig deurlopend = is besig om te + grondvorm — handeling wat NOU BESIG IS om te gebeur.',w:['Sy het gelees.','Sy sal lees.','Sy lees.']},
{type:'fill',q:'Kies die korrekte tydsvorm vir hierdie sin.',pass:'Teen die tyd dat ons gearriveer het, het die trein al ___.',blanks:['vertrek'],opts:['vertrek','sal vertrek','vertrek het','vertrekke'],eg:'Verlede tyd: het + vertrek (vertrek is \'n onveranderlike werkwoord)'},
{type:'tf',q:'Onreëlmatige werkwoorde in Afrikaans moet gememoriseer word.',a:'true',explanation:'Net soos in Engels het Afrikaans onreëlmatige werkwoorde wat nie die normale ge- reël volg nie. Byvoorbeeld: bring → gebring, koop → gekoop, maak → gemaak, eet → geëet.'},
{type:'tf',q:'"Is besig om te" kan gebruik word vir die verlede deurlopende tyd.',a:'false',explanation:'"Is besig om te" is TEENWOORDIG deurlopend (happening now). Vir verlede deurlopend gebruik ons "was besig om te". Sy IS besig om te lees (nou) vs. Sy WAS besig om te lees (toe).'},
{type:'tf',q:'"Sal" + grondvorm vorm die toekomende tyd in Afrikaans.',a:'true',explanation:'Die toekomende tyd gebruik "sal" + die grondvorm van die werkwoord sonder ge-. Ek sal MORE loop. Hulle sal VOLGENDE WEEK speel. Moenie ge- na sal gebruik nie.'}

{l:'Toekomende Tyd',bg:'#1A0D05',bd:'#F97316',tc:'#FED7AA',i:['Sal + grondvorm (geen ge-)','Ons sal more speel','Hy sal werk']},
{l:'Deurlopende Tyd',bg:'#1A0E05',bd:'#F59E0B',tc:'#FDE68A',i:['Is/was besig om te + grondvorm','Sy is besig om te eet (nou)','Hy was besig om te werk (toe)']}
]},rules:[
{n:'1',c:'#F97316',t:'Drie sleutelvrae vir tydsbepaling',d:'Vra drie vrae om die korrekte tyd te bepal.',eg:[{lbl:'GEBEUR DIT NOU?',txt:'Ja → teenwoordige tyd: ek loop'},{lbl:'HET DIT AL GEBEUR?',txt:'Ja → verlede tyd: ek het geloop'},{lbl:'GAAN DIT NOG GEBEUR?',txt:'Ja → toekomende tyd: ek sal loop'}]},
{n:'2',c:'#F59E0B',t:'ge- reël uitsonderings',d:'Werkwoorde wat begin met be-, er-, ge-, her-, ont-, ver- kry GEEN ge- nie.',eg:[{lbl:'UITSONDERINGS',txt:'bestuur → bestuur (nie gebestuur), verduidelik → verduidelik'},{lbl:'GEWONE REËL',txt:'loop → geloop, werk → gewerk, speel → gespeel'}]},

{id:'af_stompi',sec:'Taalstrukture',icon:'🔗',ttl:'STOMPI — Voegwoorde',sub:'Koordinerende voegwoorde in Afrikaans',fc:[
{type:'mc',q:'Wat staan STOMPI vir?',a:'So, Tog, Of, Maar, Plek, Indien/Insgelyks — koordinerende voegwoorde',eg:'STOMPI is \'n geheuehulp vir Afrikaanse koordinerende voegwoorde.',w:['\'n Soort sin in Afrikaans','\'n Afrikaanse leesteken','Werkwoorde wat hulpwerkwoorde benodig']},
{type:'mc',q:'Watter voegwoord verbind twee gelyke hoofrsinne?',a:'maar',eg:'Ek wil gaan, maar ek is moeg. — twee hoofrsinne gelyk verbind.',w:['omdat','sodat','al']},
{type:'fill',q:'Kies die korrekte voegwoord.',pass:'Hy wou speel ___ dit was te warm.',blanks:['maar'],opts:['maar','sodat','want','om'],eg:'maar verbind twee teenstrygende idees'},
{type:'tf',q:'Voegwoorde verbind sinne, sinsdele of woorde.',a:'true',explanation:'Voegwoorde (conjunctions) is verbindingswoorde. Hulle verbind woorde (brood en botter), sinsdele (stadig maar seker) of sinne (hy loop, maar sy ry).'},
{type:'tf',q:'STOMPI is die Afrikaanse ekwivalent van die Engelse FANBOYS.',a:'true',explanation:'Soos FANBOYS in Engels, is STOMPI \'n geheuehulp vir Afrikaanse koordinerende voegwoorde: So, Tog, Of, Maar, Plek (= want), Indien/Insgelyks.'},
{type:'tf',q:'"Omdat" is \'n koordinerende voegwoord.',a:'false',explanation:'"Omdat" is \'n ONDERSKIKKENDE voegwoord — dit lei \'n bysin in. "Ek is moeg OMDAT ek gewerk het." Die bysin kan nie alleen staan nie. Koordinerende voegwoorde (STOMPI) verbind gelyke sinne.'}

{l:'Gebruik',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['Verbind twee gelyke sinne','Beide helftes kan alleen staan','Geen komma voor STOMPI (gewoonlik)']}

{n:'2',c:'#F59E0B',t:'Onderskikkende voegwoorde (nie-STOMPI)',d:'Hierdie voegwoorde lei sinne in wat nie alleen kan staan nie.',eg:[{lbl:'LYS',txt:'omdat, sodat, al, hoewel, nadat, voordat, tensy, as, wanneer'},{lbl:'GEBRUIK',txt:'Ek wag TOTDAT hy kom. "Totdat hy kom" kan nie alleen staan nie.'}]},
{n:'3',c:'#EF4444',t:'Voegwoord-woordorde verander',d:'Sommige onderskikkende voegwoorde stuur die werkwoord na die einde van die bysin.',eg:[{lbl:'VOOR DIE BYSIN',txt:'Ek weet dat hy more KOM. (kom na die einde)'},{lbl:'NORMAAL',txt:'Hy kom more. (normalewoordorde)'}]}

{id:'af_hulpwerkwoorde',sec:'Taalstrukture',icon:'⚙️',ttl:'Hulp- en Koppelwerkwoorde',sub:'Kan, moet, mag, wil, is, was, word, het',fc:[
{type:'mc',q:'Watter sin gebruik \'n HULPWERKWOORD?',a:'"Ek moet more work."',eg:'Hulpwerkwoorde help die hoofwerkwoord. Moet + werk = hulp + hoofwerkwoord.',w:['Ek werk hard.','Sy is siek.','Ons eet pap.']},
{type:'mc',q:'Wat is die funksie van \'n koppelwerkwoord?',a:'Dit verbind die onderwerp met \'n beskrywing of voornaamwoord',eg:'Sy IS moeg. Hy WAS hier. Die dag WORD koud. — is/was/word = koppelwerkwoorde',w:['Dit beskryf HOE die handeling plaasvind','Dit vervang die selfstandige naamwoord','Dit wys die verlede tyd aan']},
{type:'mc',q:'Watter hulpwerkwoord druk TOESTEMMING uit?',a:'mag',eg:'Jy mag gaan. = Jy het toestemming.',w:['moet','kan','wil']},
{type:'tf',q:'"Kan" druk vermoë of moontlikheid uit.',a:'true',explanation:'"Kan" wys dat iemand iets in staat is om te doen of dat iets moontlik is. Ek KAN swem. (vermoë) / Dit KAN reën. (moontlikheid)'},
{type:'tf',q:'"Is" is \'n koppelwerkwoord en nie \'n hulpwerkwoord nie.',a:'true',explanation:'"Is" verbind die onderwerp met \'n beskrywing — Sy IS slim. Dit is \'n koppelwerkwoord (linking verb). Hulpwerkwoorde (modal verbs) soos kan, moet, mag help die hoofwerkwoord.'},
{type:'tf',q:'Hulpwerkwoorde kan alleen as hoofwerkwoord in \'n sin optree.',a:'false',explanation:'Hulpwerkwoorde benodig altyd \'n hoofwerkwoord om hulle te vervolg. Ek moet... (moet wat?). Hulle staan nie alleen as hoofwerkwoord nie — hulle help die hoofwerkwoord.'}
],mm:{c:'Hulp- en Koppelwerkwoorde',cc:'#F97316',b:[
{l:'Hulpwerkwoorde',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['Kan = vermoë/moontlikheid','Moet = verpligting','Mag = toestemming','Wil = begeerte/wens']},
{l:'Koppelwerkwoorde',bg:'#1A0D05',bd:'#F97316',tc:'#FED7AA',i:['Is = huidige staat','Was = verlede staat','Word = verandering','Lyk = skyn te wees']}
]},rules:[
{n:'1',c:'#F97316',t:'Hulpwerkwoord + hoofwerkwoord',d:'Hulpwerkwoorde werk altyd saam met \'n hoofwerkwoord. Die hoofwerkwoord volg altyd.',eg:[{lbl:'FORMULE',txt:'Onderwerp + hulpwerkwoord + hoofwerkwoord (+ res)'},{lbl:'VOORBEELD',txt:'Ek MOET WERK. Sy KAN SWEM. Ons WIL GAAN.'}]},
{n:'2',c:'#F59E0B',t:'Koppelwerkwoord — geen handeling',d:'Koppelwerkwoorde beskryf \'n staat, nie \'n handeling nie.',eg:[{lbl:'KOPPELWERKWOORD',txt:'Sy IS moeg. (staat, geen handeling) — moeg beskryf die onderwerp'},{lbl:'HOOFWERKWOORD',txt:'Sy SLAAP hard. (handeling) — slaap is wat sy doen'}]},
{n:'3',c:'#EF4444',t:'Modale hulpwerkwoorde',d:'Verskillende hulpwerkwoorde druk verskillende betekenisse uit.',eg:[{lbl:'KAN',txt:'vermoë: Ek kan swem. / moontlikheid: Dit kan reën.'},{lbl:'MOET',txt:'verpligting: Jy moet kom. / noodsaaklikheid: Dit moet gebeur.'},{lbl:'MAG',txt:'toestemming: Jy mag gaan. / moontlikheid (formeel): Hy mag reg wees.'}]}
],tip:{t:'Onthou die vier groot hulpwerkwoorde: KAN (able), MOET (must), MAG (may), WIL (want). Leer ook: is, was, word, het — koppelwerkwoorde verbind, hulpwerkwoorde help.',c:'#1A0D05',b:'#F97316',tc:'#FED7AA'}},

{type:'tf',q:'Aanhangsel "on-" kan gebruik word om antonieme te skep.',a:'true',explanation:'Die aanhangsel "on-" keer die betekenis om — gelukkig → ongelukkig, eerlik → oneerlik, moontlik → onmoontlik. Leer hierdie patroon om antonieme te bou.'}

{type:'tf',q:'Die tydsvorm bly dieselfde in direkte en indirekte rede.',a:'false',explanation:'Tydsvorme verskuif een stap terug in indirekte rede. Is/am/are → was/were. Sal → sou. Het gesê + teenwoordige tyd → verlede tyd in die bysin.'}

var cSubject='english';
var T=SUBJECTS[cSubject].terms;
// ── Helpers ────────────────────────────────────────────────────
function allT(){return T[1].concat(T[2]);}
function findT(id){var a=allT();for(var i=0;i<a.length;i++)if(a[i].id===id)return a[i];return null;}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function getChoices(tid,idx){var k=tid+'_'+idx;if(!choiceCache[k]){var c=findT(tid).fc[idx];choiceCache[k]=shuffle([c.a].concat(c.w.slice(0,2)));}return choiceCache[k];}
function getSecs(term){var seen={},out=[];for(var i=0;i<T[term].length;i++){var s=T[term][i].sec;if(!seen[s]){seen[s]=true;out.push(s);}}return out;}
function getCol(t){var a=allT();for(var i=0;i<a.length;i++)if(a[i].id===t.id)return COLS[i%COLS.length];return COLS[0];}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Progress ───────────────────────────────────────────────────
function updateProg(){
  var total=allT().length,done=Object.keys(doneSet).length,pct=Math.round(done/total*100);
  var el=document.getElementById('pctLbl');if(el)el.textContent=pct+'%';
  var dl=document.getElementById('doneLbl');if(dl)dl.textContent=done+L(' of '+total+' topics done',' van '+total+' onderwerpe klaar');
  var ring=document.getElementById('ringFill');if(ring)ring.style.strokeDashoffset=150.8-(150.8*pct/100);
}

// ── Tab switch ─────────────────────────────────────────────────
// Switch to a different subject (e.g. switchSubject('maths'))
function switchSubject(id){
  if(!SUBJECTS[id])return;
  cSubject=id;
  T=SUBJECTS[id].terms;
  cTerm=1;cTopic=null;cMode='fc';
  fcIdx=0;attempts=0;revealed=false;selectedWrong=[];
  fillSelected=null;fillSelections=[];
  choiceCache={};
  renderHome();
}
function swTab(t){
  cTerm=t;
  document.getElementById('tb1').className='term-btn '+(t===1?'on':'off');
  document.getElementById('tb2').className='term-btn '+(t===2?'on':'off');
  renderHome();
}

// ── Home ───────────────────────────────────────────────────────
function renderHome(){
  var secs=getSecs(cTerm),html='';
  for(var s=0;s<secs.length;s++){
    var sec=secs[s];
    var topics=T[cTerm].filter(function(t){return t.sec===sec;});
    html+='<div class="sec-lbl">'+esc(sec)+'</div><div class="topic-grid">';
    for(var i=0;i<topics.length;i++){
      var t=topics[i],ci=i%COLS.length,isDone=!!doneSet[t.id];
      html+='<div class="tc'+(isDone?' done':'')+'" style="background:'+COLS[ci].bg+';border-color:'+(isDone?'#10B981':'transparent')+'" onclick="openT(\''+t.id+'\')">'+
        '<div class="tc-ico" style="background:'+COLS[ci].lt+';font-size:22px">'+t.icon+'</div>'+
        '<div style="flex:1"><div class="tc-title">'+esc(t.ttl)+'</div><div class="tc-sub">'+esc(t.sub)+'</div></div>'+
        (isDone?'✓':'›')+
        '</div>';
    }
    html+='</div>';
  }
  document.getElementById('TGRID').innerHTML=html;
  updateProg();
}

// ── Open topic ─────────────────────────────────────────────────
function scrollToTop(){
  var tv=document.getElementById('TV');
  if(tv) tv.scrollTop=0;
  // Also scroll the main R div
  var r=document.getElementById('R');
  if(r) r.scrollTop=0;
  window.scrollTo(0,0);
}

function openT(id){
  cTopic=findT(id);cMode='fc';attempts=0;revealed=false;selectedWrong=[];
  fillSelected=null;fillSelections=[];
  // Start at first unanswered question
  fcIdx=0;
  for(var i=0;i<cTopic.fc.length;i++){
    if(!answeredSet[id+'_'+i]){fcIdx=i;break;}
    // If all answered, stay at last question
    if(i===cTopic.fc.length-1) fcIdx=i;
  }
  document.getElementById('HV').style.display='none';
  document.getElementById('TV').style.display='block';
  renderTopic();
  setTimeout(scrollToTop,50);
}
function closeT(){
  document.getElementById('TV').style.display='none';
  document.getElementById('HV').style.display='block';
  stopS();renderHome();
}
function setMode(m){cMode=m;stopS();renderTopic();} // preserves card progress

// ── Topic screen ───────────────────────────────────────────────
function renderTopic(){
  var t=cTopic,tc=getCol(t),body='';
  if(cMode==='fc')body=renderFC(t,tc);
  else if(cMode==='mm')body=renderMM(t);
  else body=renderRules(t);
  document.getElementById('TV').innerHTML=
    '<div class="tv-sticky">'+
      '<div class="topic-hdr" style="background:'+tc.bg+'">'+
        '<div class="back-row" onclick="closeT()">'+
          '<div style="width:32px;height:32px;border-radius:50%;background:#1E1B3A;border:2px solid #A78BFA;display:flex;align-items:center;justify-content:center">'+
          '←</div>'+
          '<span class="back-lbl">'+L('Back to topics','Terug na onderwerpe')+'</span>'+
        '</div>'+
        '<div class="th-ico" style="background:'+tc.lt+';font-size:30px">'+t.icon+'</div>'+
        '<div class="th-title">'+esc(t.ttl)+'</div>'+
        '<div class="th-sub">'+esc(t.sub)+'</div>'+
      '</div>'+
      '<div class="mode-pills">'+
        '<button class="mp'+(cMode==='fc'?' on':'')+'" onclick="setMode(\'fc\')">🃏 '+L('Cards','Kaarte')+'</button>'+
        '<button class="mp'+(cMode==='mm'?' on':'')+'" onclick="setMode(\'mm\')">🗺️ '+L('Mind map','Breinkaart')+'</button>'+
        '<button class="mp'+(cMode==='rules'?' on':'')+'" onclick="setMode(\'rules\')">💡 '+L('Rules','Reëls')+'</button>'+
      '</div>'+
    '</div>'+
    '<div class="tv-scroll"><div class="study-area">'+body+'</div></div>';
  setTimeout(applyGlowIfPending, 50);
}

// ── Flashcard renderer (dispatches by type) ────────────────────
function renderFC(t,tc){
  var cards=t.fc,card=cards[fcIdx],total=cards.length;
  var pct=Math.round(fcIdx/total*100);
  var hdr='<div class="card-hdr">'+
    '<span class="card-num">'+(fcIdx+1)+'/'+total+'</span>'+
    '<div class="card-bar"><div class="card-bar-fill" style="width:'+pct+'%"></div></div>'+
    '<span class="card-pts">+10 XP</span></div>';

  var body='';
  if(card.type==='mc') body=renderMC(card,t.id);
  else if(card.type==='fill') body=renderFill(card,t.id);
  else if(card.type==='fix') body=renderFix(card);
  else if(card.type==='id') body=renderID(card);
  else if(card.type==='tf') body=renderTF(card);

  var rev='';
  if(revealed){
    var gotRight=true;
    for(var k=0;k<selectedWrong.length;k++)if(selectedWrong[k]===card.a){gotRight=false;break;}
    if(card.type==='mc'){
      var rcls=gotRight?'ok':'ko';
      var rtitle=gotRight?L('Correct! +10 XP','Korrek! +10 XP'):L("Here's the answer:",'Hier is die antwoord:');
      rev='<div class="reveal '+rcls+'">'+
        '<div class="rv-ttl">'+rtitle+'</div>'+
        '<div class="rv-ans">'+esc(card.a)+'</div>'+
        (card.eg?'<div class="rv-eg">'+L('Example — ','Voorbeeld — ')+esc(card.eg)+'</div>':'')+
        '</div>';
      if(gotRight)rev+='<div class="xp-burst">🔥<span>'+L('+10 XP earned! Keep going!','+10 XP verdien! Gaan voort!')+'</span></div>';
    }
  }

  var prevDis=fcIdx===0?' disabled':'',nextDis=fcIdx===total-1?' disabled':'';
  var nextCls=revealed?'nbtn pri':'nbtn';
  var nav='<div class="nav-row">'+
    '<button class="nbtn"'+prevDis+' onclick="prevCard()">← '+L('Previous','Vorige')+'</button>'+
    '<button class="'+nextCls+'"'+nextDis+' onclick="nextCard()">'+L('Next','Volgende')+' →</button>'+
    '</div>';

  var qBadgeMap={mc:'mc',fill:'fill',fix:'fix',id:'id',tf:'tf'};
  var qLabelMap=cSubject==='afrikaans'
    ? {mc:'Meervoudige keuse',fill:'Vul in die spasie',fix:'Korrigeer die sin',id:'Identifiseer en verduidelik',tf:'Waar of onwaar'}
    : {mc:'Multiple choice',fill:'Fill in the blank',fix:'Correct the sentence',id:'Identify and explain',tf:'True or false'};
  var qBadge=qBadgeMap[card.type]||'mc',qLabel=qLabelMap[card.type]||'';
  // For fill questions, passage is rendered inside fill-sent - don't show it twice
  var passHTML=(card.pass&&card.type!=='fill')?'<div class="passage">'+(card.highlights?applyHighlights(card.pass,card.highlights):esc(card.pass))+'</div>':'';
  var ccHTML=card.tokens?renderCCSent(card.tokens):'';
  return hdr+
    '<div class="q-box">'+
      '<span class="q-badge '+qBadge+'">'+qLabel+'</span>'+
      '<div class="q-text">'+esc(card.q)+'</div>'+
      passHTML+ccHTML+
      (card.hint&&!revealed?'<div class="hint-box">'+esc(card.hint)+'</div>':'')+
    '</div>'+
    body+
    (card.type==='mc'?'<div class="att-row"><span style="font-size:12px;color:#6B7280;margin-right:4px">'+L('Attempts','Pogings')+'</span><div class="adot'+(attempts>=1?' red':'')+'"></div><div class="adot'+(attempts>=2?' red':'')+'"></div></div>':'')+
    rev+nav+
    '<button class="spk-btn" id="spkbtn" onclick="muted?toggleMute()&&speakCurrent():speakCurrent()"> '+L(muted?'Tap to unmute and play':'Read full card aloud',muted?'Tik om klank aan te skakel':'Lees kaart hardop')+'</button>';
}

function speakCurrent(){
  if(muted)return;
  var card=cTopic.fc[fcIdx];
  var text=card.q;
  var blank=L('blank','leeg');
  var optPfx=L('. Your options are: ','. Jou opsies is: ');
  var hintPfx=L('. Hint: ','. Wenk: ');
  if(card.type==='fill'){
    var sent=(card.pass||card.q).replace(/_+/g,blank);
    text=card.q+'. '+sent;
    if(card.opts&&!revealed)text+=optPfx+card.opts.join(', ')+'.';
  } else if(card.type==='mc'&&!revealed){
    if(card.pass)text+='. '+card.pass;
    var choices=getChoices(cTopic.id,fcIdx),labels=['A','B','C'];
    text+=optPfx;
    for(var i=0;i<choices.length;i++)text+=labels[i]+'. '+choices[i]+'. ';
  } else if(card.type==='tf'){
    text=L('True or false? ','Waar of onwaar? ')+card.q+(card.pass?'. '+card.pass:'');
  } else {
    if(card.pass)text+='. '+card.pass;
    if((card.type==='fix'||card.type==='id')&&card.hint)text+=hintPfx+card.hint;
  }
  speakT(text);
}

// ── MC rendering ───────────────────────────────────────────────
function renderMC(card,tid){
  var choices=getChoices(tid,fcIdx),labels=['A','B','C'],ch='';
  for(var i=0;i<choices.length;i++){
    var c=choices[i],lbl=labels[i],isC=(c===card.a),isW=false;
    for(var j=0;j<selectedWrong.length;j++)if(selectedWrong[j]===c){isW=true;break;}
    var cls='choice',ico='';
    if(revealed){
      if(isC){cls+=' cor';ico='<span class="cico">&#10003;</span>';}
      else if(isW){cls+=' wrg';ico='<span class="cico">&#10007;</span>';}
      else cls+=' dim';
    }else if(isW){cls+=' wrg';ico='<span class="cico">&#10007;</span>';}
    var dis=(revealed||isW)?' disabled':'';
    var safe=c.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    ch+='<button class="'+cls+'" onclick="pickMC(\''+safe+'\')\"'+dis+'>'+
      '<span class="clbl">'+lbl+'</span><span class="ctxt">'+esc(c)+'</span>'+ico+'</button>';
  }
  return '<div class="choices">'+ch+'</div>';
}

function pickMC(c){
  if(revealed)return;
  var already=false;for(var i=0;i<selectedWrong.length;i++)if(selectedWrong[i]===c){already=true;break;}
  if(already)return;
  var card=cTopic.fc[fcIdx];
  if(c===card.a){
    revealed=true;
    awardXP(10);
    spkOK(card.a,card.eg);
  }else{
    selectedWrong.push(c);attempts++;
    if(attempts>=2){revealed=true;spkW2(card.a,card.eg);}else spkW1();
  }
  renderTopic();
}

// ── Fill-in-blank rendering ────────────────────────────────────
var fillSelected=null;
var fillSelections=[];
function pickFillIdx(i){
  if(revealed)return;
  var card=cTopic.fc[fcIdx],o=window._fillOpts[i];
  var isMulti=card.blanks.length>1;
  var pos=fillSelections.indexOf(o);
  if(pos!==-1){fillSelections.splice(pos,1);}
  else if(fillSelections.length<card.blanks.length){fillSelections.push(o);}
  if(fillSelections.length===card.blanks.length){
    revealed=true;
    var allOk=card.blanks.every(function(b){return fillSelections.indexOf(b)!==-1;});
    if(allOk){
      awardXP(10);
      spkOK(card.blanks.join(' and '),card.eg);
    }else spkW2(card.blanks.join(' and '),card.eg);
  }
  renderTopic();
}
function pickFill(o){pickFillIdx(window._fillOpts?window._fillOpts.indexOf(o):0);}

// ── Fix/correct rendering ──────────────────────────────────────
function renderFixReveal(card){
  var inp=document.getElementById('typeIn');
  var userAns=inp?inp.value.trim():'';
  var correct=userAns.toLowerCase()===card.a.toLowerCase();
  return '<div class="reveal '+(correct?'ok':'ko')+'">'+
    '<div class="rv-ttl">'+(correct?L('Correct! +10 XP','Korrek! +10 XP'):L('The correct version:','Korrekte weergawe:'))+' </div>'+
    '<div class="rv-ans">'+esc(card.a)+'</div>'+
    (card.eg?'<div class="rv-eg">'+L('Example — ','Voorbeeld — ')+esc(card.eg)+'</div>':'')+
  '</div>';
}


function renderIDReveal(card){
  return '<div class="reveal ko">'+
    '<div class="rv-ttl">'+L('Model answer:','Modelantwoord:')+'</div>'+
    '<div class="rv-ans">'+esc(card.a)+'</div>'+
    (card.eg?'<div class="rv-eg">'+L('Example — ','Voorbeeld — ')+esc(card.eg)+'</div>':'')+
  '</div>';
}

function renderFill(card,tid){
  var sent=(card.pass||card.q).replace(/_+/g,'<span class="blank" id="bslot0">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
  var opts='<div class="bopts">';
  var shuffledOpts=card.opts?shuffle(card.opts.slice()):[];
  for(var i=0;i<shuffledOpts.length;i++){
    var o=shuffledOpts[i],cls='bopt',dis='';
    if(revealed){
      if(o===card.blanks[0])cls+=' ok';
      else if(o===fillSelected&&o!==card.blanks[0])cls+=' ko';
      else cls+=' dim';
      dis=' disabled';
    }else if(fillSelected===o)cls+=' sel';
    var safe=o.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    opts+='<button class="'+cls+'"'+dis+' onclick="pickFill(\"'+safe+'\")">'+esc(o)+'</button>';
  }
  opts+='</div>';
  var rev=revealed?'<div class="reveal '+(fillSelected===card.blanks[0]?'ok':'ko')+'">'+
    '<div class="rv-ttl">'+(fillSelected===card.blanks[0]?L('Correct! +10 XP','Korrek! +10 XP'):L('The answer is:','Die antwoord is:'))+' </div>'+
    '<div class="rv-ans">'+esc(card.blanks[0])+'</div>'+
    (card.eg?'<div class="rv-eg">'+L('Example — ','Voorbeeld — ')+esc(card.eg)+'</div>':'')+'</div>':'';
  return '<div class="fill-sent">'+sent+'</div>'+opts+rev;
}

// ── Fix/correct ────────────────────────────────────────────────
function renderFix(card){
  return '<div class="err-box"><div class="err-lbl">'+L('Sentence to correct','Sin om te korrigeer')+'</div>'+
    '<div class="err-txt">'+esc(card.pass||card.q)+'</div></div>'+
    (card.hint&&!revealed?'<div class="hint-box">'+esc(card.hint)+'</div>':'')+
    '<textarea class="type-in" id="typeIn" placeholder="'+L('Type the corrected sentence here...','Skryf die korrekte sin hier...')+'" rows="3"></textarea>'+
    '<button class="chk-btn" id="chkBtn" onclick="checkFix()">'+L('Check my answer','Kontroleer my antwoord')+'</button>'+
    (revealed?'<div class="reveal ko"><div class="rv-ttl">'+L('Correct version:','Korrekte weergawe:')+'</div><div class="rv-ans">'+esc(card.a)+'</div>'+(card.eg?'<div class="rv-eg">'+L('Example — ','Voorbeeld — ')+esc(card.eg)+'</div>':'')+'</div>':'');
}
function checkFix(){
  if(revealed)return;
  var card=cTopic.fc[fcIdx],inp=document.getElementById('typeIn');
  if(!inp||!inp.value.trim())return;
  var correct=inp.value.trim().toLowerCase()===card.a.toLowerCase();
  revealed=true;
  if(correct){inp.className='type-in ok';awardXP(10);
    spkOK(card.a,card.eg);
  }else{inp.className='type-in ko';spkW2(card.a,card.eg);}
  var chk=document.getElementById('chkBtn');if(chk)chk.disabled=true;
  var rev=document.createElement('div');
  rev.innerHTML='<div class="reveal '+(correct?'ok':'ko')+'"><div class="rv-ttl">'+(correct?L('Correct! +10 XP','Korrek! +10 XP'):L('Correct version:','Korrekte weergawe:'))+'</div><div class="rv-ans">'+esc(card.a)+'</div>'+(card.eg?'<div class="rv-eg">'+L('Example — ','Voorbeeld — ')+esc(card.eg)+'</div>':'')+'</div>';
  chk.parentNode.insertBefore(rev.firstChild,chk.nextSibling);
}

// ── Identify ───────────────────────────────────────────────────
function renderID(card){
  return (card.hint&&!revealed?'<div class="hint-box">'+esc(card.hint)+'</div>':'')+
    '<textarea class="type-in" id="typeIn" placeholder="Type your answer here..." rows="3"></textarea>'+
    '<button class="chk-btn" id="chkBtn" onclick="checkID()">'+L('Check my answer','Kontroleer my antwoord')+'</button>'+
    (revealed?'<div class="reveal ko"><div class="rv-ttl">'+L('Model answer:','Modelantwoord:')+'</div><div class="rv-ans">'+esc(card.a)+'</div>'+(card.eg?'<div class="rv-eg">'+L('Example — ','Voorbeeld — ')+esc(card.eg)+'</div>':'')+'</div>':'');
}
function checkID(){
  if(revealed)return;
  var card=cTopic.fc[fcIdx],inp=document.getElementById('typeIn');
  if(!inp||!inp.value.trim())return;
  revealed=true;markAnswered(cTopic.id,fcIdx);
  saveUser();
  spkW2(card.a,card.eg);
  var chk=document.getElementById('chkBtn');if(chk)chk.disabled=true;
  var rev=document.createElement('div');
  rev.innerHTML='<div class="reveal ko"><div class="rv-ttl">'+L('Model answer:','Modelantwoord:')+'</div><div class="rv-ans">'+esc(card.a)+'</div>'+(card.eg?'<div class="rv-eg">'+L('Example — ','Voorbeeld — ')+esc(card.eg)+'</div>':'')+'</div>';
  chk.parentNode.insertBefore(rev.firstChild,chk.nextSibling);
}

// ── True / False ───────────────────────────────────────────────
function renderTF(card){
  var tCls='tf-btn true-btn',fCls='tf-btn false-btn';
  if(revealed){if(card.a==='true'){tCls+=' sel-cor';fCls+=' dim';}else{fCls+=' sel-cor';tCls+=' dim';}}
  var dis=revealed?' disabled':'';
  var rev=revealed?'<div class="reveal ok"><div class="rv-ttl">'+L('The answer is ','Die antwoord is ')+(card.a==='true'?L('TRUE','WAAR'):L('FALSE','ONWAAR'))+'</div><div class="rv-ans">'+esc(card.explanation)+'</div></div>':'';
  return '<div class="tf-row">'+
    '<button class="'+tCls+'"'+dis+' onclick="pickTF(\'true\')"><span style="font-size:28px">✓</span>'+L('True','Waar')+'</button>'+
    '<button class="'+fCls+'"'+dis+' onclick="pickTF(\'false\')"><span style="font-size:28px">✗</span>'+L('False','Onwaar')+'</button>'+
    '</div>'+rev;
}
function pickTF(answer){
  if(revealed)return;
  var card=cTopic.fc[fcIdx],correct=(answer===card.a);
  revealed=true;
  if(correct){
    awardXP(10);
    speakT(L('Correct! That is ','Korrek! Dit is ')+(card.a==='true'?L('true','waar'):L('false','onwaar'))+'. '+card.explanation);
  }else speakT(L('Not quite. The answer is ','Nie heeltemal nie. Die antwoord is ')+(card.a==='true'?L('true','waar'):L('false','onwaar'))+'. '+card.explanation);
  renderTopic();
}

// ── Nav ────────────────────────────────────────────────────────
function nextCard(){
  if(fcIdx<cTopic.fc.length-1){
    fcIdx++;attempts=0;revealed=false;selectedWrong=[];fillSelected=null;stopS();renderTopic();
  }
}
function prevCard(){
  if(fcIdx>0){
    fcIdx--;attempts=0;revealed=false;selectedWrong=[];fillSelected=null;fillSelections=[];stopS();renderTopic();
    scrollToTop();
  }
}

// ── Mind map ───────────────────────────────────────────────────
function renderMM(t){
  var mm=t.mm,bh='';
  for(var i=0;i<mm.b.length;i++){
    var b=mm.b[i],ih='';
    for(var j=0;j<b.i.length;j++)ih+='<div class="mm-it" style="color:'+b.tc+'">'+esc(b.i[j])+'</div>';
    bh+='<div class="mm-br" style="background:'+b.bg+';border-left-color:'+b.bd+'">'+
      '<div class="mm-brtl" style="color:'+b.tc+'">'+esc(b.l)+'</div>'+ih+'</div>';
  }
  return '<div class="mm-wrap">'+
    '<div class="mm-cw"><div class="mm-ctr" style="background:'+mm.cc+'">'+esc(mm.c)+'</div></div>'+
    '<div style="padding:0 0 12px">'+bh+'</div></div>'+
    '<button class="spk-btn" onclick="muted?(toggleMute(),spkMM(cTopic.mm)):spkMM(cTopic.mm)"> '+L(muted?'Tap to unmute':'Read aloud',muted?'Tik om klank aan te skakel':'Lees hardop')+'</button>';
}

// ── Rules ──────────────────────────────────────────────────────
function renderRules(t){
  var rh='';
  for(var i=0;i<t.rules.length;i++){
    var r=t.rules[i];
    // Build example rows if r.eg is an array of {lbl,txt} objects
    var egHTML='';
    if(r.eg&&r.eg.length){
      egHTML='<div class="rule-eg">';
      for(var j=0;j<r.eg.length;j++){
        var row=r.eg[j];
        egHTML+='<div class="rule-eg-row">'+
          '<span class="rule-eg-lbl" style="background:'+r.c+'22;color:'+r.c+'">'+esc(row.lbl)+'</span>'+
          '<span class="rule-eg-txt">'+esc(row.txt)+'</span>'+
          '</div>';
      }
      egHTML+='</div>';
    }
    rh+='<div class="rule-card">'+
      '<div class="rnm" style="background:'+r.c+'">'+r.n+'</div>'+
      '<div style="flex:1"><div class="rt" style="color:'+r.c+'">'+esc(r.t)+'</div>'+
      '<div class="rd">'+esc(r.d)+'</div>'+egHTML+
      '</div></div>';
  }
  return rh+
    '<div class="tip-card" style="background:'+t.tip.c+';border-left-color:'+t.tip.b+'">'+
    '💡'+
    '<div class="tip-txt" style="color:'+t.tip.tc+'">'+esc(t.tip.t)+'</div></div>'+
    '<button class="spk-btn" onclick="muted?(toggleMute(),spkR(cTopic.rules,cTopic.tip.t)):spkR(cTopic.rules,cTopic.tip.t)"> '+L(muted?'Tap to unmute':'Read aloud',muted?'Tik om klank aan te skakel':'Lees hardop')+'</button>';
}

// ── Init ───────────────────────────────────────────────────────
renderHome();

// ── Init — runs after all data and functions are defined ───────
(function(){
  var saved = loadUser();
  if(saved && saved.name){
    currentUser = saved;
    enterApp();
  } else {
    showNameScreen();
  }
})();
</script>
