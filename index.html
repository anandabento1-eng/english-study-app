{l:'Advertisements',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['Target audience, message, technique','Slogan: short and catchy','Emotional appeal is a common technique']},
{l:'Graphs and diagrams',bg:'#1A0A1A',bd:'#A855F7',tc:'#D8B4FE',i:['Read title and labels first','Trace data with your finger','Use actual numbers in your answer']},
]},rules:[{n:'1',c:'#2563EB',t:'See then say rule',d:'Describe what you SEE first. I can see blank which suggests blank. Earns more marks than jumping to meaning.'},{n:'2',c:'#FB923C',t:'Opinion question format',d:'Yes or No + ONE clear reason linked to the text. Always use evidence from the visual.'},{n:'3',c:'#A855F7',t:'Contraction test',d:"Find the apostrophe. Expand the word. We're = We are. They're = They are. It's = It is."}],
tip:{t:"Make your own four-panel comic strip of a short story. Add speech bubbles and thought bubbles. This teaches visual communication from the inside.",c:'#0A1A1A',b:'#06B6D4',tc:'#67E8F9'}},

{id:'summ',sec:'Reading',icon:'✅',ttl:'Summary writing',sub:'Identifying main points and writing in your own words',fc:[
{type:'mc',q:'What is a summary?',a:'A shorter version of a text that includes only the main points — written entirely in your own words',eg:'A 300 word passage becomes a 70 word summary in your own words.',w:['A copy of the most interesting sentences','A longer version with more detail added','A personal response explaining what you thought']},
{type:'id',q:'Read this passage. Write a ONE-SENTENCE summary of the main idea.',pass:'Flamingos get their pink colouring from the pigment in their food called carotene — the same pigment that makes carrots orange. Without this diet, flamingos would actually be white.',a:'Flamingos are pink because of the carotene pigment found in their food.',hint:'One main idea only — not the details. Ask: what is the most important fact here?',eg:'The main idea = flamingos get their pink colour from their food (carotene)'},
{type:'mc',q:'What do you leave out of a summary?',a:'Examples, descriptions, repetition, opinions and minor details — only keep the core facts',eg:'He was so terrified he could not breathe becomes simply He was terrified.',w:['The main idea of each paragraph','The names of key people or places','The most important verbs and nouns']},
{type:'mc',q:'What is the most important rule when writing a summary?',a:'Put the original away — if you can still see it you will copy phrases instead of truly summarising',eg:'Write notes first, turn the original face down, then write from notes only.',w:['Write in exactly the same order as the original','Use the same sentence structures as the original','Include at least one direct quote']},
{type:'id',q:'Apply the traffic light method. For each sentence decide: keep (green), maybe (orange), or cut (red)?',pass:'1. The flamingo is a beautiful, striding bird.\n2. They have pink feathers and pink legs.\n3. Flamingos live in lagoons, mudflats or lakes.\n4. They sometimes live in groups of up to 10 000 birds.\n5. They get their pink colouring from carotene in their food.',a:'Green (keep): 3, 4, 5 — these are main facts. Orange (maybe): 2. Red (cut): 1 — this is a description not a fact.',hint:'Ask: is this a MAIN IDEA or just a detail? Beautiful striding bird = descriptive. Lives near water = main fact.',eg:'Keep facts that explain the flamingo. Cut descriptions and minor details.'},
{type:'mc',q:'What is the traffic light method?',a:'Green = main idea (keep). Orange = supporting detail (maybe keep). Red = minor detail (cut).',eg:'Use only the green highlights, plus some orange if you need more words.',w:['Green = verbs, Orange = nouns, Red = adjectives','Green = first paragraph, Orange = middle, Red = last','Green = facts, Orange = opinions, Red = examples to keep']},
,
{type:'tf',q:'A good summary includes lots of examples and descriptions.',a:'false',explanation:'Examples, descriptions, repetition and minor details must all be left out of a summary. You keep only the core facts and main ideas.'},
{type:'tf',q:'You should write a summary in the present tense and third person.',a:'true',explanation:'Summaries are written in present tense and third person. They must be factual, objective and in your own words.'},
{type:'tf',q:'The most important rule in summary writing is to put the original text away before you write.',a:'true',explanation:'If you can still see the original you will copy phrases instead of truly summarising. Write your notes first, then put the original away and write from your notes.'}
],mm:{c:'Summary Writing',cc:'#2563EB',b:[
{l:'What to INCLUDE',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['Main ideas only','Core facts and key points','One point per paragraph of original']},
{l:'What to LEAVE OUT',bg:'#1A0A0A',bd:'#EF4444',tc:'#FCA5A5',i:['Examples and descriptions','Direct quotes','Repeated information','Personal opinions']},
{l:'Five step process',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['1. Read whole text carefully','2. Underline main point per paragraph','3. Write notes in own words','4. PUT THE ORIGINAL AWAY','5. Write from notes only']},
]},rules:[{n:'1',c:'#10B981',t:'Main idea per paragraph',d:'Every paragraph has ONE main idea. Find it. That becomes your one summary point.'},{n:'2',c:'#EF4444',t:'Put the original away',d:'The most important rule. If you can see it you will copy instead of summarise.'},{n:'3',c:'#FB923C',t:'Own words rule',d:'If your sentence sounds like the original — rewrite it completely differently.'}],
tip:{t:"Traffic light method. Highlight main ideas green, supporting details orange and minor details red. Use only the green highlights when writing your summary.",c:'#0A1628',b:'#2563EB',tc:'#93C5FD'}},

{id:'trans',sec:'Writing',icon:'✉️',ttl:'Transactional writing',sub:'Letters, emails and notices — format earns marks',fc:[
{type:'mc',q:'What are the six parts of a formal letter?',a:"Sender's address, the date, the recipient's address, the salutation, the body and the sign-off",eg:'Use Yours sincerely when you know their name. Use Yours faithfully for Dear Sir/Madam.',w:['Title, introduction, body, conclusion, signature, date','Heading, subheading, topic sentence, evidence, conclusion, sign-off','To, from, subject, greeting, message, attachment']},
{type:'id',q:'Which sign-off is correct? Explain why.',pass:'Dear Mr Johnson,\nI am writing to request...',a:"Yours sincerely — because you used the person's actual name (Mr Johnson) in the salutation.",hint:'Sincerely = you know their name. Faithfully = Dear Sir or Dear Madam (no name).',eg:'Rule: if you wrote their NAME → Yours sincerely. If you wrote Sir or Madam → Yours faithfully'},
{type:'fix',q:'This formal letter sentence has a register error. Correct it.',pass:"I'm writing to ask if you guys can send me more info about guide dogs.",a:'I am writing to request further information about guide dogs.',hint:"No contractions in formal letters. No slang. Use formal vocabulary.",eg:"I'm → I am. you guys → you/the organisation. ask → request. info → information"},
{type:'mc',q:'Yours sincerely or Yours faithfully — when do you use each one?',a:'Sincerely when you used their actual name. Faithfully when you wrote Dear Sir or Dear Madam.',eg:'Dear Sir means Yours faithfully. Dear Mr Smith means Yours sincerely.',w:['Sincerely for informal, faithfully for formal','Sincerely for short letters, faithfully for long ones','Sincerely for female recipients, faithfully for male recipients']},
{type:'mc',q:'What must every email include?',a:'A subject line, a greeting, short clear paragraphs and a polite sign-off',eg:'Subject: Request for information about the school trip.',w:["Sender's address, recipient's address, date, postscript",'Headline, introduction, body, caption, byline','Opening statement, evidence, counter-argument, conclusion']},
{type:'mc',q:'Why are format marks the easiest marks to get in transactional writing?',a:'Because they require no creative thinking — just write the address, date, salutation and sign-off correctly',eg:'Always write the template structure first, even under time pressure.',w:['Because the examiner only checks format and ignores content','Because you can copy the format from the question paper','Because format marks come at the end where examiners are generous']},
,
{type:'tf',q:'Yours sincerely is used when you do not know the name of the person you are writing to.',a:'false',explanation:'Yours sincerely is used when you do know the person\'s name. Dear Mr Smith means Yours sincerely. When you do not know the name, Dear Sir means Yours faithfully.'},
{type:'tf',q:'Format marks in transactional writing are easy to get because they require no creative thinking.',a:'true',explanation:'Format marks just need you to write the address, date, salutation and sign-off correctly. These are free marks that cost zero creativity. Always write the template first.'},
{type:'tf',q:'Contractions like I am not and do not are acceptable in a formal letter.',a:'true',explanation:'Full words are required in formal letters. Write I am not the contracted form. No contractions, no slang and no exclamation marks in the body of a formal letter.'}
],mm:{c:'Transactional Writing',cc:'#10B981',b:[
{l:'Formal letter',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:["Sender's address top right","Date, recipient's address","Dear Mr/Ms or Dear Sir/Madam","Body paragraphs","Yours sincerely / Yours faithfully"]},
{l:'Informal letter',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:["Your address top right","Dear [first name]","Friendly conversational tone","Love from or Yours truly"]},
{l:'Email and notice',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['Email: subject line essential','Notice: bold heading, date, purpose','Bullet points for key info']},
]},rules:[{n:'1',c:'#2563EB',t:'Format marks are free marks',d:'Write address, date, salutation and sign-off even under time pressure. Easy marks.'},{n:'2',c:'#10B981',t:'Sincerely versus faithfully',d:'Sincerely = you know their NAME (Dear Mr Smith). Faithfully = no name (Dear Sir).'},{n:'3',c:'#FB923C',t:'Formal register rules',d:'No contractions. No slang. No exclamation marks. Use full formal words.'}],
tip:{t:"Make a template card for each text type. Memorise it. In the exam write the template first then fill in the content.",c:'#0A1F1A',b:'#10B981',tc:'#6EE7B7'}},

{id:'expo',sec:'Writing',icon:'📄',ttl:'Expository writing',sub:'Writing to inform — factual, structured and objective',fc:[
{type:'mc',q:'What is the purpose of expository writing?',a:'To inform or explain — to give the reader factual information about a topic',eg:'How elephants communicate. The causes of load shedding.',w:['To entertain the reader with a story','To persuade the reader to agree with you','To describe a place or person using all five senses']},
{type:'fix',q:'This expository sentence has an error. Correct it.',pass:'I think flamingos are the most interesting birds in the world.',a:'Flamingos are widely regarded as one of the most interesting birds in the world.',hint:'No personal opinions in expository writing. Remove I think. Replace with a factual statement.',eg:'I think → remove completely. Replace with a factual, objective statement.'},
{type:'mc',q:'What is a topic sentence?',a:'The first sentence of each paragraph — it tells the reader exactly what the whole paragraph is about',eg:'Flamingos live in large social groups.',w:['The last sentence of a paragraph','The most interesting sentence in the paragraph','A sentence that must always contain a simile']},
{type:'id',q:'Apply the topic sentence test. Are these topic sentences good? Explain.',pass:'Para 1: Flamingos are fascinating birds found worldwide.\nPara 2: They have a distinctive pink colouring.\nPara 3: Their diet consists mainly of algae and crustaceans.\nPara 4: Flamingos are social creatures that live in large groups.',a:'Yes — strong structure. Each topic sentence introduces a different main idea: appearance, diet, and social behaviour.',hint:'Ask: do the first sentences together tell the full story? If each covers a different aspect, the structure is strong.',eg:'Para 2 = colour. Para 3 = diet. Para 4 = social life. Different ideas = strong structure'},
{type:'mc',q:'What should you NOT include in expository writing?',a:'Personal opinions, feelings, stories or informal language — stay completely factual and objective',eg:'I think sharks are amazing is wrong. Sharks play a crucial role in ocean health is correct.',w:['Facts and statistics — these make writing too formal','Headings and subheadings — these are not allowed','Topic sentences — these make the structure too obvious']},
{type:'mc',q:'What is the sandwich check for expository writing?',a:'Read only the introduction and the conclusion — do they match? The intro introduces and the conclusion wraps up.',eg:'If they do not match, one of them is off topic. Find it and fix it.',w:['Check that the introduction is always longer than the conclusion','Check that middle paragraphs are longer than both ends','Make sure the conclusion repeats the introduction word for word']},
,
{type:'tf',q:'I think flamingos are the most interesting birds in the world is acceptable in expository writing.',a:'false',explanation:'Personal opinions must never appear in expository writing. Replace I think with a factual statement. Flamingos are widely regarded as one of the most interesting birds in the world.'},
{type:'tf',q:'Each body paragraph in an expository piece should focus on one main idea.',a:'true',explanation:'One idea per paragraph is the rule. If you find yourself writing about two different things in one paragraph, split it into two separate paragraphs.'},
{type:'tf',q:'The sandwich check means reading only the introduction and conclusion to see if they match.',a:'true',explanation:'Read only the intro and conclusion. Do they match? If not, one of them has gone off topic. The introduction introduces the topic and the conclusion wraps it up.'}
],mm:{c:'Expository Writing',cc:'#FB923C',b:[
{l:'Structure',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['Introduction → body paragraphs → conclusion','One main idea per body paragraph']},
{l:'Language features',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['Present tense, third person','Factual and objective tone','No contractions or slang']},
{l:'Common mistakes',bg:'#1A0A0A',bd:'#EF4444',tc:'#FCA5A5',i:['Personal opinions — I think','Emotional or narrative elements','Mixing tenses, no topic sentences']},
]},rules:[{n:'1',c:'#2563EB',t:'One idea per paragraph',d:'Each body paragraph covers exactly one main idea. Two different things? Split them.'},{n:'2',c:'#10B981',t:'Topic sentence first',d:'Write the topic sentence of each paragraph before anything else.'},{n:'3',c:'#EF4444',t:'Remove opinion sentences',d:'Cross out every I think, I believe, In my opinion. Replace with factual statements.'}],
tip:{t:"Sandwich check. Read only the introduction and the conclusion. Do they match? If not, one has gone off topic — fix it before you hand in.",c:'#1C1005',b:'#FB923C',tc:'#FED7AA'}},

{id:'preps',sec:'Grammar',icon:'📍',ttl:'Prepositions',sub:'Words that show position, direction and relationship',fc:[
{type:'mc',q:'What is a preposition?',a:'A word that shows the relationship between a noun and other words — usually position, direction or time',eg:'The flamingo wades in the water. The cat sat on the mat.',w:['A word that describes a noun','A word that joins two main clauses','A word that replaces a noun in a sentence']},
{type:'fill',q:'Fill in the correct preposition.',pass:'Flamingos wade around the water in search ___ food.',blanks:['of'],opts:['of','in','at','for'],eg:'"in search of something" — this is a fixed phrase'},
{type:'fill',q:'Fill in the correct preposition.',pass:'The squirrel scampered ___ his tree to examine the dog.',blanks:['down'],opts:['down','up','into','across'],eg:'Scampered DOWN from his tree = moving from high to low'},
{type:'fill',q:'Fill in the correct preposition.',pass:'The dog was sleeping comfortably next ___ the fire.',blanks:['to'],opts:['to','at','of','by'],eg:'Next TO = beside something'},
{type:'fill',q:'Fill in the correct preposition.',pass:'Jamie arrived ___ school before the bell rang.',blanks:['at'],opts:['at','in','on','to'],eg:'You arrive AT a place (school, work, home, the shops)'},
{type:'fill',q:'Fill in the correct preposition.',pass:'The flamingo stood ___ one leg in the shallow water.',blanks:['on'],opts:['on','in','at','by'],eg:'Standing ON one leg = the leg it is using to support itself'},
,
{type:'tf',q:'You arrive in school not at school.',a:'false',explanation:'You arrive at a specific place or destination. At school, at work, at home, at the shops. You use in for enclosed spaces. In the classroom, in the building.'},
{type:'tf',q:'Next to is a preposition that shows position.',a:'true',explanation:'Next to means beside something. The dog sat next to the fire. Prepositions of position include in, on, under, above, below, behind, next to and between.'},
{type:'tf',q:'In search of is a fixed prepositional phrase.',a:'true',explanation:'Some prepositions appear in fixed phrases that must be memorised. In search of, afraid of, good at and interested in are all fixed prepositional phrases.'}
],mm:{c:'Prepositions',cc:'#A855F7',b:[
{l:'Position',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['in, on, under, above, below','behind, in front of, between','next to, beside, near']},
{l:'Direction',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['to, from, towards, away from','up, down, through, across','into, out of, along']},
{l:'Time',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['at (exact time: at 3pm)','on (day: on Monday)','in (month/year: in January)']},
{l:'Fixed phrases',bg:'#1A0A1A',bd:'#A855F7',tc:'#D8B4FE',i:['in search OF','afraid OF','good AT','interested IN','next TO']},
]},rules:[{n:'1',c:'#2563EB',t:'AT / IN / ON for time',d:'AT = exact time (at 3pm). ON = a specific day (on Monday). IN = month, year, season (in January).'},{n:'2',c:'#10B981',t:'AT / IN / ON for place',d:'AT = a point (at school). IN = enclosed space (in the room). ON = a surface (on the table).'},{n:'3',c:'#A855F7',t:'Fixed phrase prepositions',d:'Some prepositions are fixed: in search of, afraid of, good at, interested in. Memorise them.'}],
tip:{t:"Preposition trick — if you can imagine it physically (on, under, behind, through) it is showing position or direction. Read the sentence aloud — the wrong preposition sounds strange.",c:'#1A0A1A',b:'#A855F7',tc:'#D8B4FE'}},

{id:'spelling',sec:'Grammar',icon:'🔤',ttl:'Spelling and punctuation correction',sub:'Correcting errors — just like in the exam',fc:[
{type:'fix',q:'Correct ALL errors in this sentence. Rewrite it in full.',pass:"Are flamingo's the most elegent birds in the world",a:"Are flamingos the most elegant birds in the world?",hint:"1. Remove wrong apostrophe — flamingos is just a plural, no apostrophe needed. 2. Fix elegant — not elegent. 3. Add a question mark at the end.",eg:"flamingos (plural, no apostrophe). elegant (correct spelling). Question needs ?"},
{type:'fix',q:'Correct ALL errors in this sentence.',pass:"The teacher said that the learners was to quiet during the test.",a:"The teacher said that the learners were too quiet during the test.",hint:"1. Concord error: learners were (not was). 2. Wrong word: too (not to) — too means very.",eg:"learners = plural = were. too quiet = very quiet (not to quiet)"},
{type:'fix',q:'Correct ALL errors in this sentence.',pass:"jamie and his friend's went to the libary on saturday morning.",a:"Jamie and his friends went to the library on Saturday morning.",hint:"1. Jamie needs a capital letter. 2. friends has a wrong apostrophe — it is just a plural. 3. library not libary. 4. Saturday needs a capital letter.",eg:"Jamie = proper noun = capital. friends = plural = no apostrophe. library = correct spelling. Saturday = proper noun = capital"},
{type:'fix',q:'Correct ALL errors in this sentence.',pass:"The principle told the learners to line up at there classrooms.",a:"The principal told the learners to line up at their classrooms.",hint:"1. principle (a rule) → principal (the head of a school). 2. there (a place) → their (belonging to them).",eg:"principal = head of school. their = belonging to the learners"},
{type:'fix',q:'Add the missing capitalisation and punctuation.',pass:"dear mr jones i am writing to ask about the science project yours faithfully sarah",a:"Dear Mr Jones,\nI am writing to ask about the science project.\nYours faithfully,\nSarah",hint:"Dear, Mr Jones, Yours faithfully and Sarah all need capital letters. Add a comma after Dear Mr Jones and after Yours faithfully. Add a full stop after the sentence.",eg:"Format a formal letter: Dear [Name], [body]. Yours faithfully, [Signature]"},
{type:'fix',q:'Correct ALL errors in this sentence.',pass:"Its going to be a beautifull day tomorrow weather permiting.",a:"It's going to be a beautiful day tomorrow, weather permitting.",hint:"1. Its → It's (it is). 2. beautifull → beautiful (one l). 3. permiting → permitting (double t). 4. Add comma before weather permitting.",eg:"it's = it is (contraction needs apostrophe). beautiful = one l. permitting = double t"},
,
{type:'tf',q:'Beautifull is the correct spelling of the word.',a:'false',explanation:'The correct spelling is beautiful with only one l at the end. Other commonly misspelt words include library, not libary, and elegant, not elegent.'},
{type:'tf',q:'The words their and there are interchangeable because they sound the same.',a:'false',explanation:'Their means belonging to them. There refers to a place. They are means a contraction of they are. These three words sound the same but have completely different meanings.'},
{type:'tf',q:'The word principal can refer to the head of a school.',a:'true',explanation:'The principal is the head of a school. A principle is a rule or belief. Remember that the principal is your pal. That helps you spell it correctly.'}
],mm:{c:'Spelling and Punctuation',cc:'#EF4444',b:[
{l:'Common spelling errors',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['beautiful (not beautifull)','library (not libary)','elegant (not elegent)','beginning (not begining)','necessary (not neccesary)']},
{l:'Common punctuation errors',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:["Wrong apostrophe in plurals (dogs' is possessive, dogs is just plural)",'Missing question mark','Missing capital letters for proper nouns','its vs it\'s — belonging vs contraction']},
{l:'Common word confusions',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['there (place) / their (belonging) / they\'re (they are)','to (direction) / too (very) / two (number)','principal (person) / principle (rule)','affect (verb) / effect (noun)']},
]},rules:[{n:'1',c:'#2563EB',t:'Four-step correction check',d:'Step 1: capitals (names, places, days). Step 2: apostrophes (contraction or possession). Step 3: spelling (sound it out, check suffixes). Step 4: end punctuation (. ? !).'},{n:'2',c:'#10B981',t:'Plural vs possessive apostrophe',d:"Dogs = just plural (no apostrophe). Dog's = one dog owns something. Dogs' = many dogs own something."},{n:'3',c:'#FB923C',t:'Confusable words',d:"there/their/they're. to/too/two. your/you're. its/it's. Expand contractions to check — you're = you are."}],
tip:{t:"Read the sentence backwards word by word. This breaks the flow and forces you to look at each word individually. Spelling errors are much easier to spot this way.",c:'#1A0A0A',b:'#EF4444',tc:'#FCA5A5'}},

{id:'newspaper',sec:'Writing',icon:'📰',ttl:'Newspaper article format',sub:'Headline, byline, intro and body — exam writing format',fc:[
{type:'mc',q:'What are the five key parts of a newspaper article?',a:'Newspaper name, headline, byline (reporter), introduction paragraph (5 Ws), and body paragraphs',eg:'The Daily News / DOG BITES LEARNER / By Jamie Smith / A Grade 6 learner was bitten...',w:['Title, salutation, body, sign-off, date','Heading, subheading, topic sentence, evidence, conclusion','Introduction, build-up, conflict, resolution, conclusion']},
{type:'mc',q:'What must the INTRODUCTION paragraph of a newspaper article answer?',a:'The five Ws — Who, What, When, Where and Why (and sometimes How)',eg:'A Grade 6 learner (WHO) was bitten by a dog (WHAT) on Monday morning (WHEN) outside Pine Street School (WHERE) while walking to school (HOW).',w:['Only Who and What — the other Ws come later','Only Why and How — these are the most important','Only When and Where — these set the scene']},
{type:'id',q:'Write a HEADLINE for this newspaper article. Make it short, punchy and in the present tense.',pass:'A Grade 6 learner named Jamie was bitten by a dog while walking to school on Monday morning outside Pine Street School.',a:'DOG BITES LEARNER ON WAY TO SCHOOL',hint:'Headlines are SHORT. They use the present tense even for past events. They are usually in CAPITAL LETTERS.',eg:'DOG BITES LEARNER ON WAY TO SCHOOL — short, present tense, punchy'},
{type:'id',q:'Write an INTRODUCTION paragraph for this newspaper article. Include at least 3 of the 5 Ws.',pass:'Event: a Grade 6 learner was bitten by a dog. Learner: Jamie. Time: Monday morning. Place: outside Pine Street School. Cause: dog ran out of a yard.',a:'A Grade 6 learner, Jamie, was bitten by a dog on Monday morning outside Pine Street School when the dog ran out of a nearby yard.',hint:'Intro = one or two sentences. Pack in Who (Jamie), What (bitten by a dog), When (Monday morning), Where (outside Pine Street School).',eg:'Pack as many Ws as possible into the opening sentence'},
{type:'mc',q:'What is a BYLINE in a newspaper article?',a:'The name of the reporter who wrote the article — written below the headline',eg:'By Jamie Smith / By Our Reporter',w:['The main heading at the top of the article in large print','A short summary paragraph below the main headline','The caption below a photograph in the article']},
{type:'mc',q:'What tense do you write a newspaper article in?',a:'Past tense for events that already happened — the article reports what occurred',eg:'The learner was bitten. The dog ran out. The teacher helped.',w:['Present tense because newspaper articles feel like they are happening now','Future tense because the article predicts what will happen next','Mixed tense — present for facts, past for the event itself']},
,
{type:'tf',q:'A newspaper headline is written in the past tense.',a:'false',explanation:'Headlines are written in the present tense even when reporting past events. Dog bites learner, not dog bit learner. This makes headlines feel urgent and immediate.'},
{type:'tf',q:'The five Ws in a newspaper article are Who, What, When, Where and Why.',a:'true',explanation:'The introduction paragraph of a newspaper article must answer all five Ws. Who was involved, what happened, when it happened, where it happened and why or how it happened.'},
{type:'tf',q:'The byline tells the reader who wrote the article.',a:'true',explanation:'The byline appears below the headline and gives the reporter name. By Jamie Smith or By Our Reporter. It identifies who wrote the article.'}
],mm:{c:'Newspaper Article',cc:'#06B6D4',b:[
{l:'Format (in order)',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['1. Newspaper name (top)','2. Headline — short and punchy, CAPITALS','3. Byline — By [reporter name]','4. Introduction — the 5 Ws in 1-2 sentences','5. Body paragraphs — details and quotes']},
{l:'The 5 Ws',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['WHO — who was involved?','WHAT — what happened?','WHEN — when did it happen?','WHERE — where did it happen?','WHY/HOW — why or how did it happen?']},
{l:'Language features',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['Past tense throughout','Third person (he/she/they)','Short punchy sentences','Include one eyewitness quote','Factual and objective — no opinions']},

// Set T to active subject terms (all existing code uses T unchanged)
var cSubject='english';
var T=SUBJECTS[cSubject].terms;
// ── Helpers ────────────────────────────────────────────────────
function allT(){return T[1].concat(T[2]);}
function findT(id){var a=allT();for(var i=0;i<a.length;i++)if(a[i].id===id)return a[i];return null;}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function getChoices(tid,idx){var k=tid+'_'+idx;if(!choiceCache[k]){var c=findT(tid).fc[idx];choiceCache[k]=shuffle([c.a].concat(c.w.slice(0,2)));}return choiceCache[k];}
function getSecs(term){var seen={},out=[];for(var i=0;i<T[term].length;i++){var s=T[term][i].sec;if(!seen[s]){seen[s]=true;out.push(s);}}return out;}
function getCol(t){var a=allT();for(var i=0;i<a.length;i++)if(a[i].id===t.id)return COLS[i%COLS.length];return COLS[0];}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Progress ───────────────────────────────────────────────────
function updateProg(){
  var total=allT().length,done=Object.keys(doneSet).length,pct=Math.round(done/total*100);
  var el=document.getElementById('pctLbl');if(el)el.textContent=pct+'%';
  var dl=document.getElementById('doneLbl');if(dl)dl.textContent=done+' of '+total+' topics done';
  var ring=document.getElementById('ringFill');if(ring)ring.style.strokeDashoffset=150.8-(150.8*pct/100);
}

// ── Home ───────────────────────────────────────────────────────
function renderHome(){
  var secs=getSecs(cTerm),html='';
  for(var s=0;s<secs.length;s++){
    var sec=secs[s];
    var topics=T[cTerm].filter(function(t){return t.sec===sec;});
    html+='<div class="sec-lbl">'+esc(sec)+'</div><div class="topic-grid">';
    for(var i=0;i<topics.length;i++){
      var t=topics[i],ci=i%COLS.length,isDone=!!doneSet[t.id];
      html+='<div class="tc'+(isDone?' done':'')+'" style="background:'+COLS[ci].bg+';border-color:'+(isDone?'#10B981':'transparent')+'" onclick="openT(\''+t.id+'\')">'+
        '<div class="tc-ico" style="background:'+COLS[ci].lt+';font-size:22px">'+t.icon+'</div>'+
        '<div style="flex:1"><div class="tc-title">'+esc(t.ttl)+'</div><div class="tc-sub">'+esc(t.sub)+'</div></div>'+
        (isDone?'✓':'›')+
        '</div>';
    }
    html+='</div>';
  }
  document.getElementById('TGRID').innerHTML=html;
  updateProg();
}

// ── Flashcard renderer (dispatches by type) ────────────────────
function renderFC(t,tc){
  var cards=t.fc,card=cards[fcIdx],total=cards.length;
  var pct=Math.round(fcIdx/total*100);
  var hdr='<div class="card-hdr">'+
    '<span class="card-num">'+(fcIdx+1)+'/'+total+'</span>'+
    '<div class="card-bar"><div class="card-bar-fill" style="width:'+pct+'%"></div></div>'+
    '<span class="card-pts">+10 XP</span></div>';

  var body='';
  if(card.type==='mc') body=renderMC(card,t.id);
  else if(card.type==='fill') body=renderFill(card,t.id);
  else if(card.type==='fix') body=renderFix(card);
  else if(card.type==='id') body=renderID(card);
  else if(card.type==='tf') body=renderTF(card);
  else if(card.type==='fill') body=renderFill(card,t.id);
  else if(card.type==='fix') body=renderFix(card);
  else if(card.type==='id') body=renderID(card);

  var rev='';
  if(revealed){
    var gotRight=true;
    for(var k=0;k<selectedWrong.length;k++)if(selectedWrong[k]===card.a){gotRight=false;break;}
    if(card.type==='mc'){
      var rcls=gotRight?'ok':'ko';
      var rtitle=gotRight?'Correct! +10 XP':"Here's the answer:";
      rev='<div class="reveal '+rcls+'">'+
        '<div class="rv-ttl">'+rtitle+'</div>'+
        '<div class="rv-ans">'+esc(card.a)+'</div>'+
        (card.eg?'<div class="rv-eg">Example — '+esc(card.eg)+'</div>':'')+
        '</div>';
      if(gotRight)rev+='<div class="xp-burst">🔥<span>+10 XP earned! Keep going!</span></div>';
    }
  }

  var prevDis=fcIdx===0?' disabled':'',nextDis=fcIdx===total-1?' disabled':'';
  var nextCls=revealed?'nbtn pri':'nbtn';
  var nav='<div class="nav-row">'+
    '<button class="nbtn"'+prevDis+' onclick="prevCard()">← Previous</button>'+
    '<button class="'+nextCls+'"'+nextDis+' onclick="nextCard()">'+(revealed?'Next →':'Next →')+'</button>'+
    '</div>';

  var qBadgeMap={mc:'mc',fill:'fill',fix:'fix',id:'id',tf:'tf'};
  var qLabelMap={mc:'Multiple choice',fill:'Fill in the blank',fix:'Correct the sentence',id:'Identify and explain',tf:'True or false'};
  var qBadge=qBadgeMap[card.type]||'mc',qLabel=qLabelMap[card.type]||'';
  var passHTML=card.pass?'<div class="passage">'+(card.highlights?applyHighlights(card.pass,card.highlights):esc(card.pass))+'</div>':'';
  var ccHTML=card.tokens?renderCCSent(card.tokens):'';
  return hdr+
    '<div class="q-box">'+
      '<span class="q-badge '+qBadge+'">'+qLabel+'</span>'+
      '<div class="q-text">'+esc(card.q)+'</div>'+
      passHTML+ccHTML+
      (card.hint&&!revealed?'<div class="hint-box">'+esc(card.hint)+'</div>':'')+
    '</div>'+
    body+
    (card.type==='mc'?'<div class="att-row"><span style="font-size:12px;color:#6B7280;margin-right:4px">Attempts</span><div class="adot'+(attempts>=1?' red':'')+'"></div><div class="adot'+(attempts>=2?' red':'')+'"></div></div>':'')+
    rev+nav+
    '<button class="spk-btn" id="spkbtn" onclick="muted?toggleMute()&&speakCurrent():speakCurrent()"> '+(muted?'Tap to unmute and play':'Read full card aloud')+'</button>';
}

function speakCurrent(){
  if(muted)return;
  var card=cTopic.fc[fcIdx];
  var text=card.q;
  if(card.type==='fill'){
    // For fill questions, read the sentence with "blank" replacing underscores
    var sent=card.pass||card.q;
    sent=sent.replace(/_+/g,'blank');
    text=card.q+'. '+sent;
    if(card.opts&&!revealed)text+='. Your options are: '+card.opts.join(', ')+'.';
  } else if(card.type==='mc'&&!revealed){
    if(card.pass)text+='. '+card.pass;
    var choices=getChoices(cTopic.id,fcIdx),labels=['A','B','C'];
    text+='. Your options are: ';
    for(var i=0;i<choices.length;i++)text+=labels[i]+'. '+choices[i]+'. ';
  } else if(card.type==='tf'){
    text='True or false? '+card.q+(card.pass?'. '+card.pass:'');
  } else {
    if(card.pass)text+='. '+card.pass;
    if((card.type==='fix'||card.type==='id')&&card.hint)text+='. Hint: '+card.hint;
  }
  speakT(text);
}

// ── MC rendering ───────────────────────────────────────────────
function renderMC(card,tid){
  var choices=getChoices(tid,fcIdx),labels=['A','B','C'],ch='';
  for(var i=0;i<choices.length;i++){
    var c=choices[i],lbl=labels[i],isC=(c===card.a),isW=false;
    for(var j=0;j<selectedWrong.length;j++)if(selectedWrong[j]===c){isW=true;break;}
    var cls='choice',ico='';
    if(revealed){
      if(isC){cls+=' cor';ico='<span class="cico">&#10003;</span>';}
      else if(isW){cls+=' wrg';ico='<span class="cico">&#10007;</span>';}
      else cls+=' dim';
    }else if(isW){cls+=' wrg';ico='<span class="cico">&#10007;</span>';}
    var dis=(revealed||isW)?' disabled':'';
    var safe=c.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    ch+='<button class="'+cls+'" onclick="pickMC(\''+safe+'\')\"'+dis+'>'+
      '<span class="clbl">'+lbl+'</span><span class="ctxt">'+esc(c)+'</span>'+ico+'</button>';
  }
  return '<div class="choices">'+ch+'</div>';
}

function pickMC(c){
  if(revealed)return;
  var already=false;for(var i=0;i<selectedWrong.length;i++)if(selectedWrong[i]===c){already=true;break;}
  if(already)return;
  var card=cTopic.fc[fcIdx];
  if(c===card.a){
    awardXP(10);
    spkOK(card.a,card.eg);
  }else{
    selectedWrong.push(c);attempts++;
    if(attempts>=2){revealed=true;spkW2(card.a,card.eg);}else spkW1();
  }
  renderTopic();
}

// ── Fill-in-blank rendering ────────────────────────────────────
var fillSelected=null;
var fillSelections=[];
function renderFill(card,tid){
  var isMulti=card.blanks&&card.blanks.length>1;
  var blankIdx=0;
  var sent=(card.pass||card.q).replace(/_+/g,function(){
    var val=fillSelections[blankIdx]||'';
    var cls='blank';
    if(revealed) cls+=(card.blanks.indexOf(fillSelections[blankIdx])!==-1?' ok':' ko');
    blankIdx++;
    return '<span class="'+cls+'">'+(val?esc(val):'&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;')+'</span>';
  });
  window._fillOpts=card.opts?shuffle(card.opts.slice()):[];
  var opts='<div class="bopts">';
  for(var i=0;i<window._fillOpts.length;i++){
    var o=window._fillOpts[i],cls='bopt',dis='';
    var isSel=fillSelections.indexOf(o)!==-1;
    var isAns=card.blanks.indexOf(o)!==-1;
    if(revealed){
      if(isAns)cls+=' ok';else if(isSel)cls+=' ko';else cls+=' dim';
      dis=' disabled';
    }else if(isSel)cls+=' sel';
    opts+='<button class="'+cls+'"'+dis+' onclick="pickFillIdx('+i+')">'+esc(o)+'</button>';
  }
  opts+='</div>';
  var allOk=revealed&&card.blanks.every(function(b){return fillSelections.indexOf(b)!==-1;});
  var rev=revealed?'<div class="reveal '+(allOk?'ok':'ko')+'">'+
    '<div class="rv-ttl">'+(allOk?'Correct! +10 XP':(card.blanks.length>1?'The answers are:':'The answer is:'))+' </div>'+
    '<div class="rv-ans">'+card.blanks.map(esc).join(' and ')+'</div>'+
    (card.eg?'<div class="rv-eg">'+esc(card.eg)+'</div>':'')+'</div>':'';
  var prompt=isMulti&&!revealed?'<div style="font-size:12px;color:#A78BFA;margin:6px 0">Select all '+card.blanks.length+' correct answers (order does not matter)</div>':'';
  return '<div class="fill-sent">'+sent+'</div>'+prompt+opts+rev;
}
function pickFillIdx(i){
  if(revealed)return;
  var card=cTopic.fc[fcIdx],o=window._fillOpts[i];
  var isMulti=card.blanks.length>1;
  var pos=fillSelections.indexOf(o);
  if(pos!==-1){fillSelections.splice(pos,1);}
  else if(fillSelections.length<card.blanks.length){fillSelections.push(o);}
  if(fillSelections.length===card.blanks.length){
    revealed=true;
    var allOk=card.blanks.every(function(b){return fillSelections.indexOf(b)!==-1;});
    if(allOk){
      awardXP(10);
      spkOK(card.blanks.join(' and '),card.eg);
    }else spkW2(card.blanks.join(' and '),card.eg);
  }
  renderTopic();
}
function pickFill(o){pickFillIdx(window._fillOpts?window._fillOpts.indexOf(o):0);}

  var card=cTopic.fc[fcIdx],inp=document.getElementById('typeIn');
  if(!inp||!inp.value.trim())return;
  revealed=true;doneSet[cTopic.id]=true;
  spkW2(card.a,card.eg);
  var chk=document.getElementById('chkBtn');if(chk)chk.disabled=true;
  var rev=document.createElement('div');
  rev.innerHTML='<div class="reveal ko"><div class="rv-ttl">Model answer:</div><div class="rv-ans">'+esc(card.a)+'</div>'+(card.eg?'<div class="rv-eg">'+esc(card.eg)+'</div>':'')+'</div>';
  chk.parentNode.insertBefore(rev.firstChild,chk.nextSibling);
}

// ── True / False ───────────────────────────────────────────────
function renderTF(card){
  var tCls='tf-btn true-btn',fCls='tf-btn false-btn';
  if(revealed){if(card.a==='true'){tCls+=' sel-cor';fCls+=' dim';}else{fCls+=' sel-cor';tCls+=' dim';}}
  var dis=revealed?' disabled':'';
  var rev=revealed?'<div class="reveal ok"><div class="rv-ttl">The answer is '+(card.a==='true'?'TRUE':'FALSE')+'</div><div class="rv-ans">'+esc(card.explanation)+'</div></div>':'';
  return '<div class="tf-row">'+
    '<button class="'+tCls+'"'+dis+' onclick="pickTF(\'true\')"><span style="font-size:28px">✓</span>True</button>'+
    '<button class="'+fCls+'"'+dis+' onclick="pickTF(\'false\')"><span style="font-size:28px">✗</span>False</button>'+
    '</div>'+rev;
}
function pickTF(answer){
  if(revealed)return;
  var card=cTopic.fc[fcIdx],correct=(answer===card.a);
  revealed=true;
  if(correct){
    awardXP(10);
    speakT('Correct! That is '+(card.a==='true'?'true':'false')+'. '+card.explanation);
  }else speakT('Not quite. The answer is '+(card.a==='true'?'true':'false')+'. '+card.explanation);
  renderTopic();
}

// ── Nav ────────────────────────────────────────────────────────
function nextCard(){
  if(fcIdx<cTopic.fc.length-1){
    fcIdx++;attempts=0;revealed=false;selectedWrong=[];fillSelected=null;stopS();renderTopic();
  }
}
function prevCard(){
  if(fcIdx>0){
    fcIdx--;attempts=0;revealed=false;selectedWrong=[];fillSelected=null;stopS();renderTopic();
  }
}

// ── Mind map ───────────────────────────────────────────────────
function renderMM(t){
  var mm=t.mm,bh='';
  for(var i=0;i<mm.b.length;i++){
    var b=mm.b[i],ih='';
    for(var j=0;j<b.i.length;j++)ih+='<div class="mm-it" style="color:'+b.tc+'">'+esc(b.i[j])+'</div>';
    bh+='<div class="mm-br" style="background:'+b.bg+';border-left-color:'+b.bd+'">'+
      '<div class="mm-brtl" style="color:'+b.tc+'">'+esc(b.l)+'</div>'+ih+'</div>';
  }
  return '<div class="mm-wrap">'+
    '<div class="mm-cw"><div class="mm-ctr" style="background:'+mm.cc+'">'+esc(mm.c)+'</div></div>'+
    '<div style="padding:0 0 12px">'+bh+'</div></div>'+
    '<button class="spk-btn" onclick="muted?(toggleMute(),spkMM(cTopic.mm)):spkMM(cTopic.mm)"> '+(muted?'Tap to unmute':'Read aloud')+'</button>';
}

// ── Rules ──────────────────────────────────────────────────────
function renderRules(t){
  var rh='';
  for(var i=0;i<t.rules.length;i++){
    var r=t.rules[i];
    rh+='<div class="rule-card">'+
      '<div class="rnm" style="background:'+r.c+'">'+r.n+'</div>'+
      '<div><div class="rt" style="color:'+r.c+'">'+esc(r.t)+'</div>'+
      '<div class="rd">'+esc(r.d)+'</div></div></div>';
  }
  return rh+
    '<div class="tip-card" style="background:'+t.tip.c+';border-left-color:'+t.tip.b+'">'+
    '💡'+
    '<div class="tip-txt" style="color:'+t.tip.tc+'">'+esc(t.tip.t)+'</div></div>'+
    '<button class="spk-btn" onclick="muted?(toggleMute(),spkR(cTopic.rules,cTopic.tip.t)):spkR(cTopic.rules,cTopic.tip.t)"> '+(muted?'Tap to unmute':'Read aloud')+'</button>';
}

// ── Init ───────────────────────────────────────────────────────
renderHome();
</script>

</html>
