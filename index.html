<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F0F1A">
<title>Grade 6 English HL</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0F0F1A;min-height:100vh}
#R{font-family:'Lexend',sans-serif;background:#0F0F1A;color:#fff;max-width:430px;margin:0 auto;min-height:100vh}

/* ── Home ── */
.home-bg{background:linear-gradient(160deg,#1A1032 0%,#0F0F1A 60%)}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#2563EB);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.xp-wrap{flex:1;margin:0 12px}
.xp-lbl{font-size:11px;color:#A78BFA;font-weight:500;margin-bottom:3px;letter-spacing:.05em}
.xp-track{height:7px;background:#1E1B3A;border-radius:4px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,#7C3AED,#38BDF8);border-radius:4px;transition:width .4s}
.streak-pill{background:#1E1B3A;border-radius:20px;padding:6px 10px;display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:#FB923C;flex-shrink:0}
.hero{padding:20px 16px 10px}
.hero-hi{font-size:13px;color:#A78BFA;font-weight:500;letter-spacing:.04em}
.hero-ttl{font-size:26px;font-weight:700;color:#fff;line-height:1.2;margin-top:4px}
.hero-ttl span{background:linear-gradient(90deg,#A78BFA,#38BDF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── Term buttons — fully explicit, no system override ── */
.term-row{display:flex;gap:10px;padding:12px 16px}
.term-btn{
  flex:1;padding:11px 0;border-radius:12px;
  font-family:'Lexend',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;border:2px solid transparent;
  transition:all .15s;
  /* kill ALL system button styling */
  -webkit-appearance:none;appearance:none;outline:none;
}
.term-btn.on{
  background:linear-gradient(135deg,#7C3AED,#4F46E5) !important;
  color:#fff !important;
  border-color:transparent !important;
}
.term-btn.off{
  background:#1E1B3A !important;
  color:#A78BFA !important;
  border-color:#312E5A !important;
}

.prog-box{margin:0 16px 8px;background:#1A1032;border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:14px}
.prog-pct{font-size:28px;font-weight:700;color:#A78BFA;line-height:1}
.prog-sub{font-size:13px;color:#6B7280;margin-top:3px}
.sec-lbl{font-size:12px;font-weight:600;color:#6B7280;letter-spacing:.08em;padding:10px 16px 6px;text-transform:uppercase}
.topic-grid{display:flex;flex-direction:column;gap:10px;padding:0 16px 24px}
.tc{border-radius:16px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;border:1.5px solid transparent;transition:transform .12s,border-color .12s}
.tc:active{transform:scale(.97)}
.tc.done{border-color:#10B981 !important}
.tc-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tc-title{font-size:15px;font-weight:600;color:#fff;line-height:1.3}
.tc-sub{font-size:12px;color:#9CA3AF;margin-top:2px}

/* ── Topic screen ── */
.topic-hdr{padding:16px}
#TV{display:flex;flex-direction:column}
.tv-sticky{position:sticky;top:0;z-index:50;background:#0F0F1A}
.tv-scroll{flex:1;overflow-y:auto}
.back-row{display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:14px}
.back-lbl{font-size:14px;font-weight:600;color:#A78BFA}
.back-row:hover .back-lbl{color:#C4B5FD}
.th-ico{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:10px}
.th-title{font-size:22px;font-weight:700;color:#fff;line-height:1.3}
.th-sub{font-size:13px;color:#9CA3AF;margin-top:4px}
.mode-pills{display:flex;gap:8px;padding:12px 16px;background:#0A0A14;border-bottom:1px solid #1E1B3A}
.mp{
  flex:1;padding:9px 6px;border-radius:10px;
  font-family:'Lexend',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;border:1.5px solid #1E1B3A;background:#131320;color:#6B7280;
  text-align:center;transition:all .15s;
  -webkit-appearance:none;appearance:none;outline:none;
}
.mp.on{background:linear-gradient(135deg,#7C3AED,#4F46E5) !important;color:#fff !important;border-color:transparent !important}
.study-area{padding:14px 16px;display:flex;flex-direction:column;gap:12px}

/* ── Card header ── */
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.card-num{font-size:13px;font-weight:600;color:#7C3AED}
.card-bar{height:4px;background:#1E1B3A;border-radius:2px;overflow:hidden;flex:1;margin:0 10px}
.card-bar-fill{height:100%;background:linear-gradient(90deg,#7C3AED,#38BDF8);border-radius:2px;transition:width .3s}
.card-pts{font-size:12px;font-weight:600;color:#FB923C}

/* ── Question box ── */
.q-box{background:#1A1032;border:1.5px solid #312E5A;border-radius:16px;padding:18px 16px}
.q-badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:8px;margin-bottom:10px;letter-spacing:.04em}
.q-badge.mc{background:#1E1B3A;color:#A78BFA}
.q-badge.tf{background:#0D1A1A;color:#34D399}
.tf-row{display:flex;gap:12px;margin-top:4px}
.tf-btn{flex:1;padding:20px 10px;border-radius:14px;font-family:'Lexend',sans-serif;font-size:17px;font-weight:700;cursor:pointer;border:2px solid;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .15s;-webkit-appearance:none;outline:none;}
.tf-btn.true-btn{background:#0A1F1A;border-color:#10B981;color:#6EE7B7}
.tf-btn.false-btn{background:#1A0A0A;border-color:#EF4444;color:#FCA5A5}
.tf-btn:not([disabled]):hover{transform:scale(1.03);filter:brightness(1.2)}
.tf-btn.sel-cor{background:#052E16 !important;border-color:#10B981 !important;color:#6EE7B7 !important;box-shadow:0 0 14px rgba(16,185,129,0.4)}
.tf-btn.sel-wrg{background:#450A0A !important;border-color:#EF4444 !important;color:#FCA5A5 !important;box-shadow:0 0 14px rgba(239,68,68,0.4)}
.tf-btn.dim{opacity:0.3;cursor:default}
.tf-btn[disabled]{cursor:default}
.q-badge.fill{background:#0A1F1A;color:#6EE7B7}
.q-badge.fix{background:#1C0A00;color:#FDBA74}
.q-badge.id{background:#0A1628;color:#93C5FD}
.q-text{font-size:16px;font-weight:600;color:#fff;line-height:1.7}
.passage{font-size:14px;color:#CBD5E1;line-height:1.9;margin:10px 0;padding:12px;background:#0F0F1A;border-radius:10px;border-left:3px solid #7C3AED;white-space:pre-wrap}
.hint-box{font-size:12px;color:#6B7280;margin-top:8px;padding:8px 10px;background:#131320;border-radius:8px;border-left:2px solid #312E5A;line-height:1.6}

/* ── Choice buttons ── */
.choices{display:flex;flex-direction:column;gap:8px}
.choice{
  width:100%;padding:13px 14px;
  border-radius:12px;
  border:2px solid #1E1B3A !important;
  background:#1A1032 !important;
  color:#E2E8F0 !important;
  font-family:'Lexend',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;text-align:left;
  display:flex;align-items:center;gap:10px;
  -webkit-appearance:none;appearance:none;outline:none;
  transition:border-color .12s,background .12s;
}
.choice:not([disabled]):not(.cor):not(.wrg):hover{
  border-color:#7C3AED !important;
  background:#221B42 !important;
  color:#E2E8F0 !important;
}
.choice.cor{background:#052E16 !important;border-color:#10B981 !important;color:#6EE7B7 !important}
.choice.wrg{background:#450A0A !important;border-color:#EF4444 !important;color:#FCA5A5 !important}
.choice.dim{background:#0F0F1A !important;color:#374151 !important;border-color:#1E1B3A !important}
.choice[disabled]{cursor:default}
.clbl{width:28px;height:28px;min-width:28px;border-radius:8px;border:1.5px solid #4B3E7A;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:#231B4A;color:#A78BFA}
.choice:not([disabled]):not(.cor):not(.wrg):hover .clbl{border-color:#7C3AED;color:#C4B5FD;background:#3D2D8A}
.choice.cor .clbl{background:#10B981;border-color:#10B981;color:#fff}
.choice.wrg .clbl{background:#EF4444;border-color:#EF4444;color:#fff}
.choice.dim .clbl{background:#1E1B3A;border-color:#1E1B3A;color:#374151}
.ctxt{flex:1;color:inherit}
.cico{margin-left:auto;font-size:18px;flex-shrink:0;color:inherit}

/* ── Fill in blank ── */
.fill-sent{font-size:16px;color:#fff;line-height:2.2;font-weight:500}
.blank{display:inline-block;min-width:100px;padding:2px 10px;border-bottom:2px solid #7C3AED;color:#A78BFA;font-weight:600;text-align:center;vertical-align:bottom}
.blank.ok{color:#6EE7B7;border-color:#10B981}
.blank.ko{color:#FCA5A5;border-color:#EF4444}
.bopts{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.bopt{
  padding:9px 18px;border-radius:10px;
  border:2px solid #312E5A;background:#1A1032;color:#A78BFA;
  font-family:'Lexend',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .15s;
  -webkit-appearance:none;appearance:none;outline:none;
}
.bopt:not([disabled]):hover{border-color:#7C3AED;background:#221B42;color:#C4B5FD}
.bopt.sel{border-color:#7C3AED;background:#2D1B69;color:#C4B5FD}
.bopt.ok{border-color:#10B981;background:#052E16;color:#6EE7B7}
.bopt.ko{border-color:#EF4444;background:#450A0A;color:#FCA5A5}
.bopt[disabled]{cursor:default}

/* ── Type/correct input ── */
.err-box{background:#0F0F1A;border:1.5px solid #312E5A;border-radius:12px;padding:14px;margin-bottom:10px}
.err-lbl{font-size:11px;font-weight:600;color:#6B7280;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.err-txt{font-size:14px;color:#FCA5A5;line-height:1.8;font-style:italic}
.type-in{
  width:100%;padding:12px 14px;border-radius:10px;
  border:2px solid #312E5A;background:#131320;color:#E2E8F0;
  font-family:'Lexend',sans-serif;font-size:14px;outline:none;
  margin-top:10px;transition:border-color .15s;
  resize:vertical;min-height:52px;
  -webkit-appearance:none;
}
.type-in:focus{border-color:#7C3AED}
.type-in.ok{border-color:#10B981;background:#052E16;color:#6EE7B7}
.type-in.ko{border-color:#EF4444;background:#450A0A;color:#FCA5A5}
.chk-btn{
  width:100%;padding:13px;border:none;border-radius:12px;
  font-family:'Lexend',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;background:linear-gradient(135deg,#7C3AED,#4F46E5);color:#fff;
  margin-top:8px;transition:opacity .15s;
  -webkit-appearance:none;
}
.chk-btn:disabled{opacity:.4;cursor:default}

/* ── Attempts / reveal ── */
.att-row{display:flex;gap:6px;align-items:center;justify-content:center;padding:4px 0}
.adot{width:10px;height:10px;border-radius:50%;border:2px solid #312E5A;background:#1E1B3A}
.adot.red{background:#EF4444;border-color:#EF4444}
.reveal{padding:14px;border-radius:14px;border:1.5px solid}
.reveal.ok{background:#022C22;border-color:#10B981}
.reveal.ko{background:#1C0A00;border-color:#FB923C}
.rv-ttl{font-size:14px;font-weight:700;margin-bottom:5px}
.reveal.ok .rv-ttl{color:#34D399}
.reveal.ko .rv-ttl{color:#FDBA74}
.rv-ans{font-size:14px;color:#E2E8F0;margin-bottom:4px;line-height:1.7}
.rv-eg{font-size:13px;color:#9CA3AF;line-height:1.6}
.xp-burst{background:#1A1032;border:1.5px solid #312E5A;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;color:#A78BFA}

/* ── Nav ── */
.nav-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.nbtn{
  padding:12px 24px;border-radius:12px;
  font-family:'Lexend',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;border:2px solid #A78BFA;background:#1E1B3A;color:#A78BFA;
  display:flex;align-items:center;gap:8px;transition:all .15s;
  -webkit-appearance:none;
}
.nbtn:not(:disabled):hover{background:#2D2A4A;border-color:#C4B5FD}
.nbtn.pri{background:linear-gradient(135deg,#7C3AED,#4F46E5);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(124,58,237,0.4)}
.nbtn:disabled{opacity:.2;cursor:default;border-color:#312E5A}
.spk-btn{
  width:100%;padding:13px;border:1.5px solid #312E5A;border-radius:12px;
  font-family:'Lexend',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  background:#1A1032;color:#A78BFA;transition:all .15s;
  -webkit-appearance:none;
}

/* Fill in blank */
.fill-sent{font-size:16px;color:#fff;line-height:2.2;font-weight:500}
.blank{display:inline-block;min-width:100px;padding:2px 10px;border-bottom:2px solid #7C3AED;color:#A78BFA;font-weight:600;text-align:center;vertical-align:bottom}
.blank.ok{color:#6EE7B7;border-color:#10B981}
.blank.ko{color:#FCA5A5;border-color:#EF4444}
.bopts{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.bopt{padding:9px 18px;border-radius:10px;border:2px solid #312E5A;background:#1A1032;color:#A78BFA;font-family:'Lexend',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-appearance:none;outline:none;}
.bopt:not([disabled]):hover{border-color:#7C3AED;background:#221B42;color:#C4B5FD}
.bopt.sel{border-color:#7C3AED;background:#2D1B69;color:#C4B5FD}
.bopt.ok{border-color:#10B981;background:#052E16;color:#6EE7B7}
.bopt.ko{border-color:#EF4444;background:#450A0A;color:#FCA5A5}
.bopt[disabled]{cursor:default}
/* Fix/ID input */
.err-box{background:#0F0F1A;border:1.5px solid #312E5A;border-radius:12px;padding:14px;margin-bottom:10px}
.err-lbl{font-size:11px;font-weight:600;color:#6B7280;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.err-txt{font-size:14px;color:#FCA5A5;line-height:1.8;font-style:italic}
.hint-box{font-size:12px;color:#6B7280;margin-top:8px;padding:8px 10px;background:#131320;border-radius:8px;border-left:2px solid #312E5A;line-height:1.6}
.type-in{width:100%;padding:12px 14px;border-radius:10px;border:2px solid #312E5A;background:#131320;color:#E2E8F0;font-family:'Lexend',sans-serif;font-size:14px;outline:none;margin-top:10px;transition:border-color .15s;resize:vertical;min-height:52px;-webkit-appearance:none;}
.type-in:focus{border-color:#7C3AED}
.type-in.ok{border-color:#10B981;background:#052E16;color:#6EE7B7}
.type-in.ko{border-color:#EF4444;background:#450A0A;color:#FCA5A5}
.chk-btn{width:100%;padding:13px;border:none;border-radius:12px;font-family:'Lexend',sans-serif;font-size:14px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#7C3AED,#4F46E5);color:#fff;margin-top:8px;-webkit-appearance:none;}
.chk-btn:disabled{opacity:.4;cursor:default}
.passage{font-size:14px;color:#CBD5E1;line-height:1.9;margin:10px 0;padding:12px;background:#0F0F1A;border-radius:10px;border-left:3px solid #7C3AED;white-space:pre-wrap}
.spk-btn.on{background:linear-gradient(135deg,#0F6E56,#10B981);color:#fff;border-color:transparent}
.mute-btn{width:40px;height:40px;border-radius:50%;flex-shrink:0;border:2px solid #A78BFA;background:#1E1B3A;color:#A78BFA;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;-webkit-appearance:none;outline:none;}
.mute-btn:hover{background:#2D2A4A;border-color:#C4B5FD}
.mute-btn:active{transform:scale(0.92)}
.mute-btn.muted{background:#450A0A;border-color:#EF4444;color:#FCA5A5;box-shadow:0 0 8px rgba(239,68,68,0.3)}

/* ── Mind map ── */
.mm-wrap{border-radius:16px;overflow:hidden;border:1.5px solid #1E1B3A}
.mm-cw{padding:14px;text-align:center;background:#0A0A14}
.mm-ctr{padding:12px 20px;border-radius:12px;display:inline-block;font-size:16px;font-weight:700;color:#fff}
.mm-br{margin:0 12px 10px;padding:12px;border-radius:12px;border-left:3px solid}
.mm-brtl{font-size:14px;font-weight:700;margin-bottom:5px}
.mm-it{font-size:13px;padding:2px 0 2px 10px;display:flex;gap:5px;line-height:1.7}
.mm-it::before{content:"→";flex-shrink:0;opacity:.6}

/* ── Rules ── */
.rule-card{background:#131320;border:1.5px solid #1E1B3A;border-radius:14px;padding:13px;display:flex;gap:11px;align-items:flex-start;margin-bottom:10px}
.rnm{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:#fff}
.rt{font-size:14px;font-weight:600;margin-bottom:3px}
.rd{font-size:13px;color:#9CA3AF;line-height:1.8}
.tip-card{border-radius:14px;padding:13px;border-left:3px solid;display:flex;gap:9px;align-items:flex-start}
.tip-txt{font-size:13px;line-height:1.8;font-weight:500}

/* ── CONFETTI ──────────────────────────────────────────────── */
#confetti-stage{
  position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;
}
.cf{
  position:absolute;top:-12px;width:10px;height:10px;
  border-radius:2px;opacity:1;
  animation:cf-fall linear forwards;
}
@keyframes cf-fall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  80%{opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* ── XP PULSE ──────────────────────────────────────────────── */
@keyframes xp-ping{
  0%{transform:scale(1)}
  40%{transform:scale(1.35)}
  70%{transform:scale(0.95)}
  100%{transform:scale(1)}
}
.xp-ping{animation:xp-ping .5s ease;}

/* ── WORD HIGHLIGHT (figures of speech) ────────────────────── */
.hl-simile{
  background:#0A2E1A;color:#6EE7B7;
  padding:1px 5px;border-radius:5px;
  border-bottom:2px solid #10B981;font-weight:700;
}
.hl-metaphor{
  background:#0A1628;color:#93C5FD;
  padding:1px 5px;border-radius:5px;
  border-bottom:2px solid #2563EB;font-weight:700;
}
.hl-person{
  background:#1A0A1A;color:#D8B4FE;
  padding:1px 5px;border-radius:5px;
  border-bottom:2px solid #A855F7;font-weight:700;
}
.hl-alliteration{
  background:#1A1A0A;color:#FDE68A;
  padding:1px 5px;border-radius:5px;
  border-bottom:2px solid #EAB308;font-weight:700;
}
.hl-key{
  background:#1C0A00;color:#FED7AA;
  padding:1px 5px;border-radius:5px;
  border-bottom:2px solid #FB923C;font-weight:700;
}
.hl-label{
  font-size:11px;font-weight:600;letter-spacing:.05em;
  padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:6px;
}

/* ── COLOUR-CODED SENTENCE BLOCKS ──────────────────────────── */
.cc-sent{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.cc-word{
  padding:7px 13px;border-radius:10px;
  font-size:14px;font-weight:600;border:2px solid transparent;
}
.cc-subj{background:#1A1032;border-color:#7C3AED;color:#A78BFA}
.cc-verb{background:#0A1F1A;border-color:#10B981;color:#6EE7B7}
.cc-obj {background:#1C1005;border-color:#FB923C;color:#FED7AA}
.cc-conj{background:#1A0A1A;border-color:#A855F7;color:#D8B4FE}
.cc-prep{background:#0A1A1A;border-color:#06B6D4;color:#67E8F9}

function showConfetti(){

}

function animateXP(oldXP, newXP){

    sf.classList.add('flame-active');
    setTimeout(function(){sf.classList.remove('flame-active');},2100);
  }
}

// Award XP with visuals — call this instead of manually updating XP
function awardXP(amount){
  var old=xp;

}

// Render a colour-coded sentence from structured data
// tokens: [{text:'The dog', role:'subj'}, {text:'barked', role:'verb'}, ...]
function renderCCSent(tokens, legend){
  var html='<div class="cc-sent">';
  for(var i=0;i<tokens.length;i++){
    html+='<span class="cc-word cc-'+tokens[i].role+'">'+esc(tokens[i].text)+'</span>';
  }
  html+='</div>';
  if(legend!==false){
    var shown={};
    var legMap={
      subj:{label:'Subject',color:'#7C3AED'},
      verb:{label:'Verb',color:'#10B981'},
      obj:{label:'Object',color:'#FB923C'},
      conj:{label:'Conjunction',color:'#A855F7'},
      prep:{label:'Preposition',color:'#06B6D4'},
      adj:{label:'Adjective',color:'#EF4444'},
      adv:{label:'Adverb',color:'#EAB308'},
    };
    html+='<div class="cc-legend">';
    for(var j=0;j<tokens.length;j++){
      var r=tokens[j].role;
      if(!shown[r]&&legMap[r]){
        shown[r]=true;
        html+='<div class="cc-leg"><div class="cc-dot" style="background:'+legMap[r].color+'"></div>'+legMap[r].label+'</div>';
      }
    }
    html+='</div>';
  }
  return html;
}

// Apply word highlights to a passage string
// highlights: [{word:'like', type:'simile'}, ...]
function applyHighlights(text, highlights){
  if(!highlights||!highlights.length) return esc(text);
  var result=esc(text);
  for(var i=0;i<highlights.length;i++){
    var h=highlights[i];
    var escaped=esc(h.word);
    result=result.replace(
      new RegExp('('+escaped.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','g'),
      '<span class="hl-'+h.type+'">$1</span>'
    );
  }
  return result;
}

function stopS(){
  if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;currentAudio=null;}

}

function cleanForTTS(text){
  var s=text.replace(/\|/g,' ').replace(/\s+/g,' ').trim();
  // Replace blank placeholders with the word blank
  s=s.replace(/_+/g,' blank ');
  // Replace symbols
  s=s.replace(/→/g,' becomes ').replace(/↔/g,' is the opposite of ').replace(/\+/g,' plus ').replace(/=/g,' equals ');
  // Convert ALL-CAPS words to lowercase (includes single letter A)
  var map={
    'THE':'the','A':'a','AN':'an','OR':'or','AND':'and','NOT':'not',
    'IS':'is','ARE':'are','WAS':'was','WERE':'were','BE':'be',
    'NOUN':'noun','VERB':'verb','NOUNS':'nouns','VERBS':'verbs',
    'SINGULAR':'singular','PLURAL':'plural','CAPITAL':'capital',
    'BEFORE':'before','AFTER':'after','AGAIN':'again',
    'MOST':'most','MORE':'more','WILL':'will','NOW':'now',
    'NEVER':'never','ALWAYS':'always','MAIN':'main',
    'WHO':'who','WHAT':'what','WHEN':'when','WHERE':'where',
    'WHY':'why','HOW':'how','NO':'no','YES':'yes',
    'ONE':'one','TWO':'two','ALL':'all','EACH':'each',
    'TRUE':'true','FALSE':'false','BOTH':'both',
    'ONLY':'only','JUST':'just','VERY':'very',
    'FIRST':'first','THEN':'then','LAST':'last',
  };
  // Replace ALL-CAPS words (1 or more chars)
  s=s.replace(/\b([A-Z]+)\b/g,function(m){
    return map[m]||m.charAt(0)+m.slice(1).toLowerCase();
  });
  s=s.replace(/\s+/g,' ').trim();
  return s;
}

// Convert plain text to SSML for better pauses and prosody
function toSSML(text){
  var s=cleanForTTS(text);
  // Add breaks at punctuation
  s=s.replace(/\.\s+/g,'.<break time="400ms"/> ');
  s=s.replace(/\!\s+/g,'!<break time="400ms"/> ');
  s=s.replace(/\?\s+/g,'?<break time="400ms"/> ');
  s=s.replace(/,\s+/g,',<break time="200ms"/> ');
  s=s.replace(/—\s*/g,'<break time="250ms"/>');
  s=s.replace(/\.\s*$/,'.<break time="300ms"/>');
  return '<speak>'+s+'</speak>';
}

function speakT(text){
  if(muted)return;
  stopS();
  var clean=cleanForTTS(text);
  if(!clean)return;
  if(!GOOGLE_TTS_KEY||GOOGLE_TTS_KEY==='YOUR_API_KEY_HERE'){browserSpeak(clean);return;}
  // Use SSML for better pauses and pronunciation
  var ssml=toSSML(text);
  var cacheKey=clean;
  if(ttsCache[cacheKey]){playBase64(ttsCache[cacheKey]);return;}
  fetch('https://texttospeech.googleapis.com/v1/text:synthesize?key='+GOOGLE_TTS_KEY,{
    method:'POST',mode:'cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({input:{ssml:ssml},voice:TTS_VOICE,audioConfig:TTS_CONFIG})

    if(data.audioContent){ttsCache[cacheKey]=data.audioContent;playBase64(data.audioContent);}
    else browserSpeak(clean);
  }).catch(function(){browserSpeak(clean);});
}

{type:'tf',q:'She is running is an example of the present progressive tense.',a:'true',explanation:'Present progressive uses is, am or are plus the verb ending in ing. She is running tells us the action is happening right now.'},
{type:'tf',q:'You can form the simple future tense by adding ed to the base verb.',a:'false',explanation:'The simple future tense uses will before the base verb. She will walk. Adding ed creates the simple past tense, not the future.'}
],mm:{c:'Verb tenses',cc:'#2563EB',b:[
{l:'Simple present',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['Habits or regular facts','She walks to school every day.']},
{l:'Simple past',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['Already finished — add -ed','Irregular: go-went, eat-ate, see-saw']},
{l:'Simple future',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['Will happen later — WILL + verb','Never add -ed after will']},
{l:'Present progressive',bg:'#1A0A1A',bd:'#A855F7',tc:'#D8B4FE',i:['Happening right NOW','is / am / are + verb-ing']},
]},rules:[{n:'1',c:'#10B981',t:'Yesterday test',d:'Put Yesterday before the sentence. Does it still make sense? Then it is past tense.'},{n:'2',c:'#FB923C',t:'Irregular verbs — memorise',d:'go-went, buy-bought, see-saw, run-ran, write-wrote, eat-ate, take-took'},{n:'3',c:'#2563EB',t:'Progressive formula',d:'is/am/are + verb + ing. She is running. Never say She is run.'}],
tip:{t:'Highlight all verbs GREEN. Every sentence must have at least one verb — no green means something is missing!',c:'#0A1628',b:'#2563EB',tc:'#93C5FD'}},

{id:'concord',sec:'Grammar',icon:'⚡',ttl:'Subject-verb agreement',sub:'Making subjects and verbs match in number',fc:[
{type:'mc',q:'What does subject-verb concord mean?',a:'The subject and verb must match — both singular or both plural',eg:'The dog barks. The dogs bark.',w:['The subject always comes before the verb','The verb always ends in -ing','The subject must always be a noun']},
{type:'fill',q:'Choose the correct verb form.',pass:'Everyone in the class ___ ready for the exam.',blanks:['is'],opts:['is','are','were','have'],eg:'Everyone is always singular — even though it sounds like many people'},
{type:'fix',q:'Correct the concord error in this sentence.',pass:'Studies suggest that an online obsession also affect school performance.',a:'Studies suggest that an online obsession also affects school performance.',hint:'The subject is "an online obsession" which is SINGULAR — use affects not affect.',eg:'obsession = singular = affects. obsessions = plural = affect'},
{type:'fill',q:'Choose the correct verb.',pass:'The teacher and the learners ___ already in the hall.',blanks:['are'],opts:['is','are','was','has'],eg:'AND joins two subjects — that always makes a PLURAL subject'},
{type:'mc',q:'Which words always take a singular verb?',a:'everyone, nobody, someone, each, either, neither',eg:'Nobody knows. Each child has a pen.',w:['all, both, many, few, several','they, we, you, them','and, but, because, although']},
{type:'mc',q:'With or and nor — how do you choose the verb?',a:'Match the verb to the nearest subject',eg:'Either the cat or the dogs ARE responsible — nearest is dogs which is plural.',w:['Always use a plural verb after or','Always match the verb to the first subject','Always use a singular verb after or']},
,
{type:'tf',q:'Everyone are ready is grammatically correct.',a:'false',explanation:'Everyone is always singular even though it sounds like many people. The correct sentence is Everyone is ready.'},
{type:'tf',q:'When AND joins two subjects the verb must be plural.',a:'true',explanation:'AND always creates a plural subject. The teacher and the learners are here. Both subjects together require the plural verb are.'},
{type:'tf',q:'With OR or NOR you always match the verb to the nearest subject.',a:'true',explanation:'Either the cat or the dogs are responsible. The nearest subject is dogs which is plural, so the verb is are.'}
],mm:{c:'Concord',cc:'#FB923C',b:[
{l:'Singular needs singular verb',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['One person or thing','The dog BARKS. She IS happy.','is, has, was, does, runs']},
{l:'Plural needs plural verb',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['More than one','The dogs BARK. They ARE happy.','are, have, were, do, run']},
{l:'Always SINGULAR',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['everyone, nobody, someone, each','either, neither, everything, anyone']},
{l:'AND versus OR',bg:'#1A0A1A',bd:'#A855F7',tc:'#D8B4FE',i:['AND = plural verb','OR/NOR = match nearest subject','Tom and Sam ARE here','Tom or Sam IS here']},
]},rules:[{n:'1',c:'#2563EB',t:'He or they test',d:'Replace the subject with he or they. Match the verb to whichever fits.'},{n:'2',c:'#FB923C',t:'Everyone and nobody are singular',d:'Everyone IS ready — never Everyone ARE ready.'},{n:'3',c:'#10B981',t:'AND=plural, OR=match nearest',d:'Tom and Sam ARE here. Tom or Sam IS here — match nearest subject.'}],
tip:{t:'Underline the subject. Circle the verb. Do they match? Five seconds. Stops most concord mistakes.',c:'#1C1005',b:'#FB923C',tc:'#FED7AA'}},

{id:'adjadv',sec:'Grammar',icon:'✨',ttl:'Adjectives and adverbs',sub:'Describing words and degrees of comparison',fc:[
{type:'mc',q:'What does an adjective do?',a:'It describes or gives more information about a noun',eg:'tall boy, red apple, three dogs, happy child',w:['It describes a verb — telling how, when or where','It replaces a noun so it is not repeated','It joins two clauses or sentences together']},
{type:'fill',q:'Write down the ADVERB from this sentence.',pass:'Flamingos walk slowly in the water.',blanks:['slowly'],opts:['slowly','Flamingos','walk','water'],eg:'Adverbs tell us HOW an action is done — slowly describes how they walk'},
{type:'fix',q:'Correct the adjective form in this sentence.',pass:'The male flamingos are big than the females.',a:'The male flamingos are bigger than the females.',hint:'Comparing TWO things — add -er to form the comparative. big becomes bigger.',eg:'big → bigger (two things) / biggest (three or more things)'},
{type:'mc',q:'How do you form a superlative adjective?',a:'Add -est or use most to compare three or more things',eg:'tall becomes tallest — beautiful becomes most beautiful',w:['Add -er or use more to compare three things','Add -ly to the end of the adjective','Put will before the adjective']},
{type:'mc',q:'She sings beautiful or beautifully — which is correct?',a:'Beautifully — it describes how she sings, so use the adverb form with -ly',eg:'She sings beautifully. NOT She sings beautiful.',w:['Beautiful — adjectives always follow the verb directly','Both are correct — they mean the same thing','Beautiful — singing is treated as a noun here']},
{type:'fill',q:'Choose the correct adjective form.',pass:'Of all the birds in the flock, the flamingo is the ___ colourful.',blanks:['most'],opts:['more','most','very','much'],eg:'Comparing THREE or more things — use MOST for long adjectives'},
,
{type:'tf',q:'More taller is a correct comparative form.',a:'false',explanation:'You never combine more with an er ending. The correct form is simply taller. Either add er or use more, never both together.'},
{type:'tf',q:'Most adverbs end in ly.',a:'true',explanation:'Adverbs that describe verbs usually end in ly. Quickly, slowly, carefully and loudly all tell us how something is done.'},
{type:'tf',q:'She sings beautiful is grammatically correct.',a:'false',explanation:'Beautiful is an adjective. Since it describes how she sings, which is a verb, you need the adverb form. She sings beautifully is correct.'}
],mm:{c:'Adjectives and Adverbs',cc:'#A855F7',b:[
{l:'Adjectives describe nouns',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['Colour, size, feeling, number','tall, red, happy, three']},
{l:'Degrees of comparison',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['Positive: tall, good, big','Comparative (2): taller','Superlative (3+): tallest']},
{l:'Adverbs describe verbs',bg:'#1A0A1A',bd:'#A855F7',tc:'#D8B4FE',i:['How, when, where, how much','quickly, yesterday, here','Most end in -ly']},
]},rules:[{n:'1',c:'#2563EB',t:'Adjective test',d:'Does the word describe a NOUN? That is an adjective. Highlight it pink.'},{n:'2',c:'#A855F7',t:'Adverb test',d:'Does the word describe a VERB? That is an adverb. Usually ends in -ly. Highlight it orange.'},{n:'3',c:'#FB923C',t:'Comparison rule',d:'Short words: add -er/-est. Long words: use more/most. Never say more taller — that is wrong.'}],
tip:{t:"Upgrade challenge. Take 'The dog ran.' Add pink adjectives and orange adverbs. How vivid can you make it?",c:'#1A0A1A',b:'#A855F7',tc:'#D8B4FE'}},

{id:'punct',sec:'Grammar',icon:'📌',ttl:'Punctuation',sub:'Full stops, commas, apostrophes, colons, semi-colons',fc:[
{type:'mc',q:'When do you use a full stop?',a:'At the end of a statement sentence',eg:'She ran home.',w:['After every comma in a list of items','To introduce a list at the end of a sentence','To join two closely related main clauses']},
{type:'fix',q:'Correct ALL spelling and punctuation errors. Rewrite the full sentence.',pass:"Are flamingo's the most elegent birds in the world",a:"Are flamingos the most elegant birds in the world?",hint:"Remove the wrong apostrophe. Fix the spelling of elegant. Add a question mark at the end.",eg:"flamingos = plural (no apostrophe). elegant = correct spelling. Question needs a ?"},
{type:'fill',q:'Choose the correct word.',pass:"The dog wagged ___ tail excitedly.",blanks:['its'],opts:["its","it's","its'","it is"],eg:"Belonging — no apostrophe needed. it's would mean 'it is' which makes no sense here"},
{type:'fix',q:'Add the missing punctuation. Rewrite the sentence correctly.',pass:'I need three things a pen a ruler and paper',a:'I need three things: a pen, a ruler, and paper.',hint:'Use a colon to introduce the list. Use commas to separate the items.',eg:'Colon (:) = here comes a list. Comma (,) separates each item.'},
{type:'mc',q:"The word don't — what does the apostrophe show?",a:"A contraction — two words have been joined. Do not becomes don't.",eg:"don't = do not, can't = cannot, it's = it is",w:["Possession — something belongs to something","Plural — there is more than one","Comparison — something is more than something"]},
{type:'mc',q:"The dog's bone — what does the apostrophe show?",a:"Possession — the bone belongs to ONE dog. The apostrophe goes before the s.",eg:"One owner means apostrophe before the s",w:["A contraction — two words have been joined","A plural — there is more than one dog here","A comparison — the dog is better than something"]},
,
{type:'tf',q:'A colon is used to introduce a list.',a:'true',explanation:'A colon tells the reader here is what follows. I need three things: a pen, a ruler and paper.'},
{type:'tf',q:'The word its with an apostrophe always shows belonging.',a:'false',explanation:'The word with an apostrophe means it is. It is a contraction, not a possessive. The possessive form has no apostrophe, as in the dog wagged its tail.'},
{type:'tf',q:'A semi-colon can join two closely related main clauses.',a:'true',explanation:'A semi-colon links two sentences that are closely connected in meaning. I love reading; books are my escape.'}
],mm:{c:'Punctuation',cc:'#EF4444',b:[
{l:'End of sentence',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['Full stop ends a statement','Question mark ends a question','Exclamation mark shows strong feeling']},
{l:'Inside sentence',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['Comma — list or pause','Semi-colon — joins two related sentences','Colon — introduces a list']},
{l:'Apostrophe',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:["Possession: boy's hat — one owner","Plural possession: boys' hats","Contraction: don't = do not"]},
]},rules:[{n:'1',c:'#2563EB',t:'Apostrophe test',d:"Can you expand it? don't = do not = contraction. Does it show belonging? = possession."},{n:'2',c:'#10B981',t:"its versus it's",d:"its = belonging (no apostrophe). it's = it is (contraction). Say 'it is' in the sentence — if it fits, use the apostrophe."},{n:'3',c:'#FB923C',t:'Colon versus semi-colon',d:'Colon = here comes a list. Semi-colon = these two sentences are closely linked.'}],
tip:{t:"Read the sentence out loud. Wrong apostrophes and missing question marks are easy to catch when you listen.",c:'#1A0A0A',b:'#EF4444',tc:'#FCA5A5'}},

{id:'fig1',sec:'Figurative language',icon:'🪄',ttl:'Simile, metaphor, personification',sub:'The three most common figures of speech',fc:[
{type:'mc',q:'What is a simile?',a:'It compares two things using the words like or as',eg:'He is as fast as lightning. She ran like the wind.',w:['It says one thing IS another without like or as','It gives human qualities to a non-human thing','It is a short wise saying about everyday life']},
{type:'id',q:'Identify the figure of speech in this sentence.',pass:'John is as wise as an elephant.',highlights:[{word:'as wise as',type:'simile'}],a:'Simile',hint:'Look for the word AS. It compares John to an elephant using AS.',eg:'as wise as = using AS to compare two things = simile'},
{type:'mc',q:'What is a metaphor?',a:'It says one thing IS another — without using like or as',eg:'Life is a journey. The classroom was a zoo.',w:['It compares two things using like or as','It gives human qualities to a non-human thing','It cannot be taken literally']},
{type:'id',q:'Identify the figure of speech in this sentence.',pass:'The old car coughed and spluttered down the road.',highlights:[{word:'coughed',type:'person'},{word:'spluttered',type:'person'}],a:'Personification',hint:'Coughing is a human action — a car cannot cough. Non-human thing doing a human action = personification.',eg:'coughed = human action given to the car = personification'},
{type:'id',q:'Identify the figure of speech in this sentence.',pass:'The classroom was a zoo by the end of the day.',highlights:[{word:'was',type:'metaphor'}],a:'Metaphor',hint:'The classroom is directly called a zoo — no like or as used. One thing IS said to BE another thing.',eg:'classroom IS a zoo — no like or as = metaphor'},
{type:'mc',q:'What is personification?',a:'It gives human qualities or actions to a non-human thing',eg:'The wind whispered. The sun smiled down.',w:['It compares two things using like or as','It says one thing IS another without like or as','It repeats the same starting sound in words']},
,
{type:'tf',q:'The classroom was a zoo is an example of a simile.',a:'false',explanation:'This is a metaphor. The classroom is directly called a zoo without using like or as. A simile would say the classroom was like a zoo.'},
{type:'tf',q:'Personification gives human qualities to non-human things.',a:'true',explanation:'Personification means making a non-human thing do something only humans can do. The wind whispered and the sun smiled down are both examples of personification.'},
{type:'tf',q:'The word as always signals that a simile is being used.',a:'false',explanation:'As can signal a simile only when comparing two different things, such as as fast as lightning. But as can also be used in other ways that are not similes.'}
],mm:{c:'Figures of Speech',cc:'#06B6D4',b:[
{l:'Simile',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['Uses LIKE or AS to compare','fast AS lightning / ran LIKE the wind']},
{l:'Metaphor',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['Says something IS something else','NO like or as — Life IS a journey']},
{l:'Personification',bg:'#1A0A1A',bd:'#A855F7',tc:'#D8B4FE',i:['Human qualities to non-humans','The wind WHISPERED / sun SMILED']},
]},rules:[{n:'1',c:'#10B981',t:'Simile spotter',d:'Scan for like or as in a comparison — that is your simile.'},{n:'2',c:'#2563EB',t:'Metaphor check',d:'Two unlike things compared directly without like or as — metaphor. The word is or was often signals it.'},{n:'3',c:'#A855F7',t:'Personification check',d:'Is a non-human thing doing something only humans can do? Whispering, smiling, crying? That is personification.'}],
tip:{t:"Draw it! Take any simile and sketch the literal image. Her smile was sunshine — draw a face with rays. The picture makes it stick.",c:'#0A1A1A',b:'#06B6D4',tc:'#67E8F9'}},

{id:'idioms',sec:'Figurative language',icon:'💬',ttl:'Idioms, proverbs, alliteration',sub:'Expressions whose meaning is not literal',fc:[
{type:'mc',q:'What is an idiom?',a:"A phrase whose meaning is completely different from the actual words — you cannot take it literally",eg:"It's raining cats and dogs means it is raining very heavily",w:['A short wise saying that gives life advice','The repetition of the same starting sound','A comparison using like or as']},
{type:'id',q:'Paragraph 5 uses alliteration. Write down THREE words that illustrate the alliteration.',pass:'The dog was furious and charged at the animals, snarling, scowling and snapping his jaws!',highlights:[{word:'snarling',type:'alliteration'},{word:'scowling',type:'alliteration'},{word:'snapping',type:'alliteration'}],a:'snarling, scowling, snapping',hint:'Alliteration = same starting sound repeated. Look for words starting with the same letter.',eg:'snarling, scowling, snapping — all start with the S sound'},
{type:'mc',q:"What does the idiom under the weather mean?",a:'Feeling sick or unwell',eg:'She stayed home because she was feeling under the weather.',w:['Standing outside in the rain','Feeling very excited and energetic','Being confused about the weather forecast']},
{type:'mc',q:'What is a proverb?',a:'A short well-known saying that gives life advice or a moral truth',eg:"Don't judge a book by its cover means don't judge by appearances",w:['A phrase whose real meaning differs from the words','The repetition of the same starting sound','A comparison using like or as']},
{type:'id',q:'Write down the IDIOM in this sentence and explain its meaning.',pass:'Despite losing the match, the team decided to face the music and speak to their coach.',a:'face the music — to accept the consequences of your actions',hint:'Which phrase sounds impossible if taken literally? That is the idiom.',eg:'Face the music does not mean turning toward sound — it means accepting consequences'},
{type:'mc',q:'What is alliteration?',a:'The repetition of the same starting sound in a series of words',eg:'Peter Piper picked a peck of pickled peppers — the P sound is repeated',w:['Words that rhyme at the end of lines','The repetition of vowel sounds in the middle','A phrase that cannot be taken at face value']},
,
{type:'tf',q:'Break a leg literally means you should injure yourself.',a:'false',explanation:'Break a leg is an idiom. Its real meaning is good luck. Idioms cannot be taken literally because their meaning is completely different from the actual words.'},
{type:'tf',q:'Alliteration is the repetition of the same starting sound.',a:'true',explanation:'Alliteration repeats the same beginning sound in a series of words. Peter Piper picked a peck of pickled peppers repeats the P sound.'},
{type:'tf',q:'A proverb is just another word for an idiom.',a:'false',explanation:'Proverbs are short wise sayings that give life advice as complete sentences. Actions speak louder than words is a proverb. Idioms are everyday phrases whose meaning differs from the actual words.'}
],mm:{c:'Idioms and More',cc:'#EAB308',b:[
{l:'Common idioms',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['Raining cats and dogs = very heavy rain','Under the weather = feeling ill','Piece of cake = very easy','Break a leg = good luck']},
{l:'Proverbs',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:["Don't judge a book by its cover","Actions speak louder than words","Every cloud has a silver lining","Practice makes perfect"]},
{l:'Alliteration',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['Same starting SOUND repeated','snarling, scowling, snapping — S','Peter Piper picked... — P']},
]},rules:[{n:'1',c:'#FB923C',t:'Idiom test',d:'Read it literally. Does it sound impossible or very strange? Then it is probably an idiom.'},{n:'2',c:'#10B981',t:'Proverb versus idiom',d:'Proverbs give advice as a complete sentence. Idioms are everyday phrases.'},{n:'3',c:'#2563EB',t:'Alliteration',d:'Say the words aloud. Do several start with the same sound? That is alliteration.'}],
tip:{t:"Draw the literal meaning of an idiom. Raining cats and dogs — draw actual cats and dogs falling from clouds. The silly picture makes the meaning unforgettable.",c:'#1C1005',b:'#EAB308',tc:'#FDE68A'}},

{id:'comp',sec:'Reading',icon:'👁️',ttl:'Comprehension strategies',sub:'Literal, inferential, vocabulary and opinion questions',fc:[
{type:'mc',q:'What is a literal comprehension question?',a:'The answer is directly in the text — you just need to find it and rephrase it',eg:'According to the passage, how old is the character?',w:['The answer is not in the text — you must think it through','The answer comes from your own personal experience','You combine information from different paragraphs']},
{type:'id',q:'Read the sentence and work out the meaning of the underlined word.',pass:'The ravenous lion ate everything in sight and licked its lips for more.',a:'ravenous means extremely hungry',hint:'Look at what the lion does — eats everything in sight. That tells you ravenous must mean very hungry.',eg:'Context clue: ate everything in sight — so ravenous = extremely hungry'},
{type:'mc',q:'What is skimming?',a:'Reading quickly to get the general idea — you do not read every single word',eg:'Look at the heading and the first and last sentence of each paragraph',w:['Carefully looking for a specific name or number','Reading every single word very slowly','Re-reading a difficult paragraph several times']},
{type:'mc',q:'What is scanning?',a:'Looking for specific information such as a name, a date or a number',eg:'Run your finger down the page looking only for what you need',w:['Reading quickly to get the general idea','Reading the whole text aloud to understand it','Predicting what the text will be about']},
{type:'id',q:'Complete the inference frame for this evidence.',pass:'The text says the boy was shaking and his face had gone pale.',a:'The text says the boy was shaking and his face had gone pale. This tells me that he was very frightened.',hint:'Frame: The text says ___ . This tells me that ___. The second part is your inference.',eg:'Evidence: shaking + pale face. Inference: he was very frightened'},
{type:'mc',q:'What is the inference sentence frame?',a:'The text says blank. This tells me that blank.',eg:'The text says the boy was shaking. This tells me he was very frightened.',w:['I think blank because I feel blank','In conclusion blank therefore blank','According to me blank is true because blank']},
,
{type:'tf',q:'A literal question requires you to read between the lines to find the answer.',a:'false',explanation:'A literal question has its answer directly in the text. You just need to find it and rephrase it. It is the inferential question that requires reading between the lines.'},
{type:'tf',q:'Skimming means reading quickly to get the general idea of a text.',a:'true',explanation:'When skimming you read quickly without reading every word. You look at headings and the first and last sentence of each paragraph to get the main idea.'},
{type:'tf',q:'Context clues can help you work out the meaning of an unknown word.',a:'true',explanation:'Read the sentence without the unknown word and ask what would make sense in its place. The surrounding words give you clues to the meaning.'}
],mm:{c:'Comprehension',cc:'#2563EB',b:[
{l:'Question types',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['Literal — find it in the text','Inferential — read between the lines','Vocabulary — meaning in context','Opinion — your view plus evidence']},
{l:'Reading strategies',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['Skim = quick general read','Scan = look for specific detail','Predict = use title and pictures']},
{l:'Answering tips',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['One mark = one clear point','Write in full sentences always','Quote the text then explain it']},
]},rules:[{n:'1',c:'#2563EB',t:'One mark = one point',d:'Every mark equals one clear point. Write full sentences. Never leave a question blank.'},{n:'2',c:'#10B981',t:'Inference frame',d:'The text says blank — this suggests blank. Always back up with evidence from the text.'},{n:'3',c:'#FB923C',t:'Unknown word strategy',d:'Read the sentence without the word. What would make sense? Use the surrounding words.'}],
tip:{t:'Before reading: look at the title and any pictures — predict what the passage is about. This gets your brain ready.',c:'#0A1628',b:'#2563EB',tc:'#93C5FD'}},

{id:'poetry',sec:'Reading',icon:'🪶',ttl:'Poetry',sub:'Rhyme, rhythm, stanza, tone and poetic devices',fc:[
{type:'mc',q:'What is a stanza in a poem?',a:'A group of lines in a poem — just like a paragraph in prose writing',eg:'A poem with four groups of four lines has four stanzas.',w:['A single line in a poem','The rhyming pattern at the end of lines','The overall mood or feeling of the poem']},
{type:'id',q:'Label the rhyme scheme of these four lines.',pass:'The cat sat on a mat\nAnd had a little chat\nThen found a cosy bed\nAnd rested her small head',a:'AABB — mat/chat rhyme (A), bed/head rhyme (B)',hint:'Label each end word. Same rhyme = same letter. New rhyme = next letter.',eg:'mat = A, chat = A, bed = B, head = B — so the scheme is AABB'},
{type:'mc',q:'What is the tone of a poem?',a:'The feeling or mood the poem creates — how it makes you feel when you read it',eg:'joyful, sad, angry, peaceful, fearful, mysterious',w:['The title the poet chose','The number of stanzas the poem contains','The rhyme scheme pattern used']},
{type:'id',q:'What is the tone of this poem extract? Give evidence from the text.',pass:'"The shadows crept silently across the cold, empty room.\nNot a sound. Not a breath. Only the hollow echo of fear."',a:'The tone is fearful because the poet uses words like shadows, cold, empty and fear which suggest danger and dread.',hint:'Tone frame: The tone is ___ because the poet uses words like ___ which suggest ___.',eg:'shadows, cold, empty, fear — all negative and threatening words'},
{type:'mc',q:'What is rhythm in a poem?',a:'The beat or pattern of stressed syllables — just like music',eg:'Clap it out — The CAT sat ON the MAT — feel the beat!',w:['The meaning or message of the poem','The words that rhyme at the end of lines','The figurative devices used in the poem']},
{type:'mc',q:'What is the tone answer frame for the exam?',a:'The tone of this poem is blank because the poet uses words like blank which suggest blank.',eg:'The tone is peaceful because the poet uses softly and quiet which suggest calm.',w:['I think the poem is blank because I like it','The poem is about blank which makes it feel blank','The stanza shows blank because there are blank lines']},
,
{type:'tf',q:'A stanza in a poem is the same as a paragraph in prose.',a:'true',explanation:'A stanza is a group of lines in a poem, just like a paragraph is a group of sentences in prose writing. Both group related ideas together.'},
{type:'tf',q:'ABAB rhyme scheme means the first two lines rhyme with each other.',a:'false',explanation:'ABAB means alternate lines rhyme. The first line rhymes with the third and the second line rhymes with the fourth. AABB is where the first two lines rhyme together.'},
{type:'tf',q:'Tone and mood mean exactly the same thing in poetry.',a:'false',explanation:'Tone is how the poet feels. It is the attitude the poet takes toward the subject. Mood is how the poem makes the reader feel. They are related but different.'}
],mm:{c:'Poetry',cc:'#A855F7',b:[
{l:'Structure',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['Stanza = group of lines','Rhyme scheme = AABB, ABAB etc','Rhythm = the beat — clap it out!']},
{l:'Devices in poems',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['Simile, metaphor, personification','Alliteration: same starting sound']},
{l:'Tone and mood',bg:'#1A0A1A',bd:'#A855F7',tc:'#D8B4FE',i:['Tone = how the POET feels','Mood = how the poem makes YOU feel','Look at word choices for clues']},
]},rules:[{n:'1',c:'#2563EB',t:'Label the rhyme scheme',d:'Write A beside the first end word. Same rhyme gets A again. New rhyme gets labelled B.'},{n:'2',c:'#10B981',t:'Clap the rhythm',d:'Clap every syllable as you read aloud. The stressed beats are louder — feel the pattern.'},{n:'3',c:'#A855F7',t:'Tone answer frame',d:'The tone is blank because the poet uses words like blank which suggest blank.'}],
tip:{t:"Draw the mood. After reading a poem, imagine a colour or weather that matches the feeling. Sketch it. Helps you explain tone in the exam.",c:'#1A0A1A',b:'#A855F7',tc:'#D8B4FE'}},

{id:'desc',sec:'Writing',icon:'🎨',ttl:'Descriptive writing',sub:'Senses, figurative language and strong word choices',fc:[
{type:'mc',q:'What are the five senses in descriptive writing?',a:'See, hear, smell, touch and taste',eg:'The burning sun scorched my skin. I smelled the salty sea air.',w:['Think, feel, guess, wonder, imagine','Read, write, speak, listen, draw','Look, sound, taste, smell, move']},
{type:'fix',q:'"Show don\'t tell" — rewrite this sentence to SHOW the feeling instead of naming it.',pass:'Jamie was very excited about the race.',a:"Jamie's heart hammered in his chest. His feet bounced off the ground as he waited at the starting line.",hint:'Instead of naming the feeling (excited), describe what the body DOES when excited.',eg:'hammering heart, bouncing feet — these SHOW excitement without naming it'},
{type:'mc',q:'What is a topic sentence?',a:'The first sentence of a paragraph — it tells the reader exactly what the whole paragraph is about',eg:'The market was a feast for all the senses.',w:['The last sentence that summarises the paragraph','A sentence that must always contain a simile','The most descriptive sentence in the paragraph']},
{type:'mc',q:'Which words should you avoid in descriptive writing?',a:'Vague words like nice, good, bad, big and small — replace them with specific powerful words',eg:'nice becomes wonderful or delightful or breathtaking',w:['Adjectives and adverbs — they complicate writing','Past tense verbs — always write in present tense','Long sentences — always use short simple sentences']},
{type:'id',q:'Upgrade this sentence. Replace the weak verb and add at least one adjective.',pass:'The big dog walked down the road.',a:'The enormous dog lumbered down the dusty road.',hint:'Replace big with a precise adjective. Replace walked with a stronger verb.',eg:'big → enormous. walked → lumbered. road → dusty road'},
{type:'mc',q:'Name two figurative devices most used in descriptive writing',a:'Simile and personification — they paint vivid pictures with words',eg:'The lightning sliced the sky like a blade. The thunder growled.',w:['Rhyme and rhythm — they make writing musical','Idioms and proverbs — they add wisdom','Summary and paraphrase — they keep writing concise']},
,
{type:'tf',q:'Jamie was very excited is a good example of show don\'t tell.',a:'false',explanation:'This tells us the feeling by naming it directly. Show don\'t tell means describing the physical signs. Jamie\'s heart hammered and his feet bounced off the ground shows excitement without naming it.'},
{type:'tf',q:'Vague words like nice and good should be replaced with more precise words in descriptive writing.',a:'true',explanation:'Vague words do not create a vivid picture. Replace nice with wonderful, breathtaking or delightful. Replace good with excellent, superb or outstanding.'},
{type:'tf',q:'The topic sentence is always the last sentence in a paragraph.',a:'false',explanation:'The topic sentence is always the first sentence in a paragraph. It tells the reader what the whole paragraph is about before the details follow.'}
],mm:{c:'Descriptive Writing',cc:'#10B981',b:[
{l:'The five senses',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['See, Hear, Smell, Touch, Taste','Use all five to paint a vivid picture']},
{l:'Strong language',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['Powerful verbs: lumbered, dashed, crept','Precise adjectives: enormous, ancient, jagged','Avoid: nice, good, bad, big, small']},
{l:'Structure',bg:'#1A0A1A',bd:'#A855F7',tc:'#D8B4FE',i:['Topic sentence — what you describe','Details — senses and figurative','Closing sentence — impression or feeling']},
]},rules:[{n:'1',c:'#2563EB',t:'Mind map before you write',d:'Five branches = five senses. Fill each branch. Only THEN start writing.'},{n:'2',c:'#FB923C',t:"Show don't tell rule",d:'Cross out any sentence that just names a feeling. Replace it with what that feeling looks like.'},{n:'3',c:'#A855F7',t:'Upgrade your verbs',d:'Circle every weak verb like went, said, walked. Replace each with something stronger.'}],
tip:{t:"Read your description aloud. Close your eyes. Can you picture it? Could someone draw it from your words alone? If not — add more sensory detail.",c:'#0A1F1A',b:'#10B981',tc:'#6EE7B7'}},

{id:'narr',sec:'Writing',icon:'📓',ttl:'Narrative writing',sub:'Story structure, characters, dialogue and paragraphing',fc:[
{type:'mc',q:'What are the five parts of story structure?',a:'Introduction, build-up, conflict, resolution and conclusion',eg:'Intro: meet Jamie. Build-up: finds a key. Conflict: trapped. Resolution: uses key. Conclusion: home safe.',w:['Beginning, middle, end, characters, setting','Topic sentence, evidence, explanation, link, conclusion','Title, setting, characters, problem, moral lesson']},
{type:'fix',q:'Correct the punctuation of this direct speech sentence.',pass:'"I am going home she said"',a:'"I am going home," she said.',hint:'You need: speech marks around the spoken words, a comma before the closing mark, reporting verb outside.',eg:'Open marks → words → comma → close marks → reporting verb'},
{type:'fill',q:'Choose the correct tense.',pass:'Yesterday, Jamie ___ to school with his friends.',blanks:['walked'],opts:['walk','walked','will walk','is walking'],eg:'Yesterday signals PAST tense — use the simple past form WALKED'},
{type:'mc',q:'When do you start a new paragraph in a story?',a:'New time, new place, new speaker or new idea',eg:'Different character speaks — new paragraph. Scene changes — new paragraph.',w:['Every five sentences regardless of content','Only when there is a change of speaker','Only at the very beginning and very end']},
{type:'mc',q:'What makes a character feel real?',a:'Give them a goal and a fear — show personality through what they do and say',eg:"Instead of saying he was shy — show him avoiding eye contact and speaking in a whisper.",w:['Describe their physical appearance in great detail','Write a paragraph explaining all their feelings','Give them a very unusual name that stands out']},
{type:'id',q:'Apply the conflict formula: WHO wants WHAT but WHAT goes wrong?',pass:'Character: Jamie. Want: to win the 100m race at sports day.',a:'Jamie wants to win the 100m race at sports day but he twists his ankle at the starting line.',hint:'WHO wants WHAT = Jamie wants to win the race. But WHAT goes wrong = something stops him.',eg:'The conflict is the WORST thing that could happen to your character right now'},
,
{type:'tf',q:'Stories should be written in the present tense.',a:'false',explanation:'Stories are written in the past tense because you are telling something that has already happened. Jamie walked to school. He saw something strange.'},
{type:'tf',q:'You should start a new paragraph every time a different character speaks.',a:'true',explanation:'New speaker, new paragraph. This is one of the four rules for starting a new paragraph. It makes dialogue easier to follow.'},
{type:'tf',q:'"I am going home," she said. This direct speech is punctuated correctly.',a:'true',explanation:'The speech marks open, the spoken words follow, then a comma before the closing speech mark, then the reporting verb outside. This is the correct format.'}
],mm:{c:'Story Writing',cc:'#FB923C',b:[
{l:'Story structure',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['Introduction → Build-up → Conflict','Resolution → Conclusion']},
{l:'Characters',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['Give them a goal and a fear','Show feelings — never just name them']},
{l:'Technical',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['Past tense throughout','Direct speech with correct punctuation','New paragraph: new time, place or speaker']},
]},rules:[{n:'1',c:'#2563EB',t:'Plan with a story map',d:'Draw five boxes before you start. Sketch one scene in each box. Stops you getting stuck.'},{n:'2',c:'#10B981',t:'Direct speech formula',d:'Open marks. Write the words. Add comma or ? or !. Close marks. Then the reporting verb.'},{n:'3',c:'#FB923C',t:'Tense check',d:'Can you put Yesterday before each sentence? If yes — past tense correct. Fix any present tense slips.'}],
tip:{t:"WHO wants WHAT but WHAT goes wrong? That is your entire story. Jamie wants to win the race but breaks his leg.",c:'#1C1005',b:'#FB923C',tc:'#FED7AA'}},
],2:[
{id:'speech2',sec:'Grammar',icon:'💭',ttl:'Direct and reported speech',sub:'Converting between direct and reported speech',fc:[
{type:'mc',q:'What is direct speech?',a:'The exact words that were spoken — always written inside quotation marks',eg:'"I am hungry," said Liam.',w:['It reports what was said without quotation marks','It is a summary of what someone said','It is a description of how someone spoke']},
{type:'fix',q:'Convert this direct speech to REPORTED speech.',pass:'"I will donate R10 towards the training of guide dogs," the man said.',a:'The man said that he would donate R10 towards the training of guide dogs.',hint:'Remove marks. Add that. Change I to he. Change will to would.',eg:'Steps: remove marks → add that → I becomes he → will becomes would'},
{type:'fill',q:'Choose the correct reported speech tense.',pass:'She said that she ___ going to the library.',blanks:['was'],opts:['is','was','will be','has been'],eg:'Present tense shifts one step back in reported speech. is going becomes WAS going'},
{type:'mc',q:'What three things change when you convert to reported speech?',a:'Remove the speech marks, change pronouns such as I to he or she, and shift the tense one step back',eg:'"I will come." becomes She said she would come.',w:['Remove commas, change adjectives, add a past tense marker','Change the reporting verb, add speech marks, remove the subject','Add that, change verb to -ing, remove pronouns']},
{type:'fix',q:'Convert this REPORTED speech back to DIRECT speech.',pass:'The man said that he would donate R10 towards the training of guide dogs.',a:'"I will donate R10 towards the training of guide dogs," the man said.',hint:'Add speech marks. Change he to I. Change would to will. Put the reporting verb after the closing marks.',eg:'Reverse the steps: add marks → he becomes I → would becomes will'},
{type:'mc',q:'What are the five steps to convert to reported speech?',a:'Remove the marks, add that, change the pronoun, shift the tense, and change the time words',eg:'"I am going now." becomes He said that he was going then.',w:['Add marks, change verb, add that, remove subject, add comma','Change verb, remove that, add pronoun, shift time, add marks','Remove subject, add verb, change tense, add marks, change place']},
,
{type:'tf',q:'In reported speech you keep the original quotation marks.',a:'false',explanation:'In reported speech you remove the quotation marks entirely. The words are no longer quoted directly. They are reported indirectly.'},
{type:'tf',q:'When converting to reported speech, will changes to would.',a:'true',explanation:'Tenses shift one step back in reported speech. Will becomes would. Am or is becomes was. Are becomes were.'},
{type:'tf',q:'The word now changes to then when converting to reported speech.',a:'true',explanation:'Time words shift back in reported speech. Now becomes then, today becomes that day and here becomes there.'}
],mm:{c:'Speech',cc:'#7C3AED',b:[
{l:'Direct speech',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['Exact words inside speech marks','"I love school," she said.','Comma or ? or ! before closing mark']},
{l:'Reported speech',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['No speech marks','Add THAT. Change pronoun. Shift tense.','now → then. will → would']},
{l:'Tense changes',bg:'#1A0A1A',bd:'#A855F7',tc:'#D8B4FE',i:['am/is → was, are → were','will → would, can → could','have/has → had']},
]},rules:[{n:'1',c:'#10B981',t:'Tense shift rule',d:'Present → past. Future → would. I am → he was. I will → he would. Always go one step back.'},{n:'2',c:'#FB923C',t:'Pronoun shift rule',d:'I → he/she. We → they. My → his/her. Think about who said it.'},{n:'3',c:'#A855F7',t:'Five step checklist',d:'1: remove marks. 2: add that. 3: change pronoun. 4: shift tense. 5: change time words.'}],
tip:{t:"Cover the speech marks. Read what is left. Change every I to he/she and every present verb to past. That is eighty percent of the job done.",c:'#1A1032',b:'#7C3AED',tc:'#A78BFA'}},

{id:'wordbuild',sec:'Grammar',icon:'🧩',ttl:'Prefixes, roots and suffixes',sub:'Breaking words apart to understand their meaning',fc:[
{type:'mc',q:'What is a root word?',a:'The base of a word — the core meaning that all other parts attach to',eg:'play, run, happy, kind, care',w:['Letters added to the front of a word','Letters added to the end of a word','A word that cannot be changed']},
{type:'fill',q:'Add a PREFIX to make the word mean the OPPOSITE.',pass:'The dog was very ___ comfortable sleeping on the thorny bush.',blanks:['un'],opts:['un','re','pre','mis'],eg:'UN- reverses the meaning. uncomfortable = not comfortable'},
{type:'mc',q:'What does the prefix re- mean?',a:'AGAIN or BACK — it means doing something over again',eg:'play → replay, write → rewrite, build → rebuild',w:['NOT — it reverses the meaning','BEFORE — something happens before','WRONGLY — you do the action incorrectly']},
{type:'id',q:'Use your knowledge of prefixes and roots to work out the meaning of this word.',pass:'unpredictable',a:'un = not. predict = foresee. able = can be done. So unpredictable means cannot be predicted or foreseen.',hint:'Peel off the prefix (un = not). Peel off the suffix (able = can be done). Root = predict = to foresee.',eg:'un + predict + able = cannot be predicted'},
{type:'fix',q:'Add the correct suffix to complete the sentence.',pass:'The athlete ran with great ______. [quick]',a:'The athlete ran with great quickness.',hint:'Quick is an adjective. To make it a noun showing a state or quality, add -ness.',eg:'quick (adjective) + -ness = quickness (noun)'},
{type:'mc',q:'What does the prefix un- mean?',a:'NOT — it reverses the meaning of the root word',eg:'happy → unhappy, kind → unkind, fair → unfair',w:['AGAIN — to repeat the action','BEFORE — something happens before','BADLY — you do the action incorrectly']},
,
{type:'tf',q:'The prefix un- means to do something again.',a:'false',explanation:'The prefix un- means not. It reverses the meaning of the root word. Happy becomes unhappy. The prefix that means again is re-, as in replay and rewrite.'},
{type:'tf',q:'Hopeless contains the suffix less which means without.',a:'true',explanation:'The suffix less means without. Hopeless means without hope. Careless means without care. Harmless means without harm.'},
{type:'tf',q:'Adding a suffix can change a word from one word class to another.',a:'true',explanation:'Happy is an adjective. Add ness and it becomes happiness, which is a noun. Quick is an adjective. Add ly and it becomes quickly, which is an adverb.'}
],mm:{c:'Word Building',cc:'#10B981',b:[
{l:'Common prefixes',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['un- = not (unhappy, unkind)','re- = again (replay, rewrite)','mis- = wrongly (mistake)','pre- = before (preview)','dis- = opposite (disagree)']},
{l:'Common suffixes',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['-ful = full of (hopeful)','-less = without (hopeless)','-ness = state of (happiness)','-ly = in a way (quickly)']},
{l:'Exam strategy',bg:'#1A0A1A',bd:'#A855F7',tc:'#D8B4FE',i:['Peel off prefix first','Then peel off suffix','What does the root mean?','Build up the full meaning']},
]},rules:[{n:'1',c:'#2563EB',t:'Peel the word apart',d:'Like Lego. Pull off the prefix. Pull off the suffix. The root is what remains — core meaning.'},{n:'2',c:'#FB923C',t:'Spelling when adding -ly',d:'Word ends in -le: drop e, add y (simple → simply). Ends in -y: change to i, add -ly (happy → happily).'},{n:'3',c:'#A855F7',t:'Suffixes change word class',d:'Happy (adjective) + -ness = happiness (noun). Quick (adjective) + -ly = quickly (adverb).'}],
tip:{t:"Word tree. Draw a trunk with the root word. Branches left = prefixes. Branches right = suffixes. Leaves = the full new words.",c:'#0A1F1A',b:'#10B981',tc:'#6EE7B7'}},

{id:'sents',sec:'Grammar',icon:'⛓️',ttl:'Sentence types',sub:'Simple, compound and complex sentences',fc:[
{type:'mc',q:'What is a simple sentence?',a:'One main clause with one subject and one verb — makes complete sense on its own',eg:'The dog barked. She laughed. Rain fell heavily.',tokens:[{text:'The dog',role:'subj'},{text:'barked',role:'verb'}],w:['Two main clauses joined by and or but','A main clause plus a clause that cannot stand alone','A sentence that contains more than one verb']},
{type:'fill',q:'Join these two sentences using the conjunction in brackets.',pass:'The tortoise did not run. The tortoise went into her shell. [because]',tokens:[{text:'The tortoise',role:'subj'},{text:'did not run',role:'verb'},{text:'because',role:'conj'},{text:'she',role:'subj'},{text:'went into her shell',role:'verb'}],blanks:['The tortoise did not run because she went into her shell.'],opts:['The tortoise did not run because she went into her shell.','Because the tortoise did not run the shell.','The tortoise went because she did not run into her shell.','She did not run the tortoise because into her shell.'],eg:'Because joins a reason — the tortoise did not run BECAUSE she went into her shell'},
{type:'id',q:'Identify the sentence type.',pass:'Do flamingos live in South America?',a:'Question',hint:'Look at the word order and the punctuation at the end. Does it have a question mark?',eg:'Flamingos live in South America = statement. Do flamingos live...? = question'},
{type:'mc',q:'What is a complex sentence?',a:'One main clause plus a subordinate clause — the subordinate clause cannot stand alone',eg:'She stayed inside because it was raining.',w:['Two main clauses joined by and or but','A single short sentence with one verb','Three or more clauses joined together']},
{type:'fix',q:'Rewrite as a COMPLEX sentence using the conjunction given.',pass:'Jamie studied hard. Jamie passed the exam. [although]',a:'Although Jamie studied hard, he passed the exam.',hint:'Although introduces the subordinate clause. Main clause (he passed the exam) is the main idea.',eg:'Although + subordinate clause + comma + main clause'},
{type:'mc',q:'What do the letters in FANBOYS stand for?',a:'For, And, Nor, But, Or, Yet, So — these are all the coordinating conjunctions',eg:'I was tired but I finished the work.',w:['First, After, Next, Before, Often, Yesterday, Since','From, About, Next, By, On, Your, Since','Finally, Also, Now, Because, Often, Yet, So']},
,
{type:'tf',q:'The dog barked and the cat ran away is a complex sentence.',a:'false',explanation:'This is a compound sentence. Two main clauses are joined by the coordinating conjunction and. Both halves can stand alone. A complex sentence has one clause that cannot stand alone.'},
{type:'tf',q:'A subordinate clause can stand alone as a complete sentence.',a:'false',explanation:'A subordinate clause cannot stand alone. That is what makes it subordinate. Because it was raining is incomplete on its own. It needs a main clause to make sense.'},
{type:'tf',q:'FANBOYS is a memory aid for coordinating conjunctions.',a:'true',explanation:'FANBOYS stands for For, And, Nor, But, Or, Yet, So. These are all the coordinating conjunctions used to join two main clauses in a compound sentence.'}
],mm:{c:'Sentence Types',cc:'#2563EB',b:[
{l:'Simple',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['One subject + one verb','The dog barked. She laughed.']},
{l:'Compound',bg:'#1C1005',bd:'#FB923C',tc:'#FED7AA',i:['Two main clauses + FANBOYS','The dog barked and the cat ran.']},
{l:'Complex',bg:'#1A0A1A',bd:'#A855F7',tc:'#D8B4FE',i:['Main + subordinate clause','She stayed because it rained.','Subordinate clause CANNOT stand alone']},
]},rules:[{n:'1',c:'#10B981',t:'Stand-alone test',d:'Cover one half. Can it stand alone? Both can → compound. One cannot → complex.'},{n:'2',c:'#FB923C',t:'FANBOYS for compound',d:'For, And, Nor, But, Or, Yet, So. Spell FANBOYS to remember all coordinating conjunctions.'},{n:'3',c:'#A855F7',t:'Build up from simple',d:'Add FANBOYS = compound. Add because or although = complex.'}],
tip:{t:"Sentence tiles. Write each clause and the conjunction on separate pieces of paper. Move them around to form all three types.",c:'#0A1628',b:'#2563EB',tc:'#93C5FD'}},

{id:'synant',sec:'Vocabulary',icon:'↔️',ttl:'Synonyms and antonyms',sub:'Words with similar and opposite meanings',fc:[
{type:'mc',q:'What is a synonym?',a:'A word with a similar meaning to another word',eg:'happy = joyful = cheerful = delighted = elated',w:['A word with the opposite meaning','A word that sounds the same but has a different meaning','A word formed by adding a prefix or suffix']},
{type:'fill',q:'Write down the SYNONYM for the word found in paragraph 1.',pass:'In the jungle, a dog was sleeping comfortably until a squirrel discovered him.',blanks:['found'],opts:['found','sleeping','comfortably','jungle'],eg:'Discovered means found. Look for the word that means the same as found.'},
{type:'mc',q:'What is an antonym?',a:'A word with the opposite meaning to another word',eg:'happy and sad, fast and slow, increase and decrease',w:['A word with a similar meaning','A word that sounds the same but is spelt differently','A word formed by adding -ly to an adjective']},
{type:'fix',q:'Replace the underlined word with a more PRECISE synonym.',pass:'The dog made a nice sound as it ran through the grass.',a:'The dog made a joyful sound as it bounded through the grass.',hint:'Nice is vague. Replace with a specific, powerful word. Replace ran with a stronger verb.',eg:'nice → joyful / cheerful. ran → bounded / dashed / sprinted'},
{type:'fill',q:'Give an ANTONYM for the word growing.',pass:'The population of flamingos is growing every year.',blanks:['shrinking'],opts:['shrinking','increasing','improving','expanding'],eg:'Growing means getting bigger. The opposite = getting smaller = SHRINKING'},
{type:'mc',q:'Why are synonyms useful in your writing?',a:'They stop you repeating the same word and make writing more interesting and precise',eg:"Instead of writing nice three times: beautiful, wonderful, delightful.",w:['They make sentences shorter','They allow you to write in a different tense','They help you avoid adjectives and adverbs']},
,
{type:'tf',q:'Joyful is a synonym for happy.',a:'true',explanation:'Synonyms have similar meanings. Happy, joyful, cheerful, delighted and elated all mean roughly the same thing. Using synonyms avoids word repetition in your writing.'},
{type:'tf',q:'Most antonyms are formed by adding the prefix re- to a word.',a:'false',explanation:'Antonyms are most commonly formed with un-, dis- or im-. The prefix re- means again, not opposite.'},
{type:'tf',q:'Shrinking is an antonym for growing.',a:'true',explanation:'Antonyms have opposite meanings. Growing means getting bigger. Shrinking means getting smaller. They are direct opposites.'}
],mm:{c:'Word Relationships',cc:'#EAB308',b:[
{l:'Synonyms',bg:'#0A1F1A',bd:'#10B981',tc:'#6EE7B7',i:['Same or similar meaning','happy = joyful = cheerful','Avoids word repetition in writing']},
{l:'Antonyms',bg:'#0A1628',bd:'#2563EB',tc:'#93C5FD',i:['Opposite meaning','hot ↔ cold, growing ↔ shrinking','Many made with un-, dis-, im- prefix']},
{l:'Power words',bg:'#1A0A1A',bd:'#A855F7',tc:'#D8B4FE',i:['said → whispered, shouted, declared','walked → marched, trudged, crept','bad → dreadful, awful, terrible']},
]},rules:[{n:'1',c:'#10B981',t:'Upgrade your writing',d:'Circle every said, walked, nice, big, bad. Replace each with a more precise synonym.'},{n:'2',c:'#2563EB',t:'Antonym prefixes',d:'un- makes unhappy. dis- makes dishonest. im- or in- makes impatient.'},{n:'3',c:'#A855F7',t:'Context matters',d:'Skinny and slender both mean thin but skinny sounds negative. Choose the right synonym.'}],
tip:{t:"Synonym slam. One person shouts a common word. The other shouts a better synonym as fast as possible. Two minutes builds automatic recall under exam pressure.",c:'#1C1005',b:'#EAB308',tc:'#FDE68A'}},

{id:'visual',sec:'Reading',icon:'🖼️',ttl:'Visual literacy',sub:'Reading images, cartoons, advertisements and diagrams',fc:[
{type:'mc',q:'What is visual literacy?',a:'The ability to read and interpret images, diagrams, cartoons and advertisements',eg:'Understanding what a picture means, its message, and who it is aimed at',w:['The ability to read very quickly and accurately','The ability to describe exactly what you see','The ability to draw or create visual artwork']},
{type:'id',q:'Study the advertisement slogan. Write down the contraction and expand it fully.',pass:"We're looking out for you! — Guide Dogs South Africa",a:"We're = We are",hint:"A contraction joins two words with an apostrophe. Find the apostrophe and expand it.",eg:"We're = We + are. The apostrophe replaces the missing letter A"},
{type:'mc',q:'What does a speech bubble show in a cartoon?',a:'What the character is saying out loud — the spoken words',eg:"A round bubble with a tail pointing to the character's mouth",w:['What the character is thinking — private thoughts','What the character wants to do next','What happened before the current scene']},
{type:'mc',q:'How do you start a visual text answer in the exam?',a:'I can see blank which suggests blank — describe what you see before saying what it means',eg:'I can see a large red stop sign which suggests the message is urgent.',w:['In my opinion the image shows blank','The image is about blank','This picture means blank']},
{type:'id',q:'Study this advertisement. Would you support this organisation? Give ONE reason.',pass:'Guide Dogs South Africa — Guide dogs are: faithful, intelligent, loyal. Your donation is needed to train more guide dogs.',a:'Yes, I would support this organisation because guide dogs help visually impaired people to live more independently.',hint:'Opinion question = yes/no + one clear reason. Use evidence from the advertisement.',eg:'Your reason should relate to the purpose of guide dogs and why that matters'},
{type:'mc',q:'What three questions do you ask when analysing an advertisement?',a:'Who is the target audience? What is being sold or promoted? What technique is used to persuade you?',eg:'Guide Dogs SA — targets animal lovers — uses emotional appeal.',w:['Who drew it and when was it made?','How many colours and words are used?','What is the rhyme scheme and rhythm?']},
,
{type:'tf',q:'A speech bubble in a cartoon shows what a character is thinking.',a:'false',explanation:'A speech bubble shows what the character is saying out loud. A thought bubble, which is cloud shaped with small circles, shows what the character is thinking privately.'},
{type:'tf',q:'When analysing a visual text you should describe what you see before explaining what it means.',a:'true',explanation:'Always describe what you see first. I can see a large red stop sign. Then explain what it suggests. This earns more marks than jumping straight to the meaning.'},
{type:'tf',q:'A caption is the large heading at the top of a newspaper article.',a:'false',explanation:'A caption is a short sentence below or beside an image that explains or adds context. The large heading at the top of a newspaper article is called the headline.'}
],mm:{c:'Visual Literacy',cc:'#06B6D4',b:[
